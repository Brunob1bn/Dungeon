    function roundRect(ctx, x, y, w, h, r, fill) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      if (fill) ctx.fill(); else ctx.stroke();
    }

    function render() {
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.clearRect(0, 0, cw, ch);
      if (!game.room) return;

      let sx = 0, sy = 0;
      if (game.shake > 0) {
        sx = rand(-game.shake, game.shake);
        sy = rand(-game.shake, game.shake);
      }

      ctx.save();
      ctx.translate(-Math.floor(game.camera.x) + Math.floor(sx), -Math.floor(game.camera.y) + Math.floor(sy));
      drawRoom(game.room);
      drawLightingOverlay();
      ctx.restore();

      drawUI();
    }

    let last = 0;
    function loop(ts) {
      const dt = clamp((ts - last) / 1000 || 0.016, 0, 0.033);
      last = ts;
      updateGame(dt);
      render();
      requestAnimationFrame(loop);
    }

    function getTouchPos(touch) {
      const rect = canvas.getBoundingClientRect();
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top, id: touch.identifier };
    }

    function onPointerDown(x, y, id, isTouch = false) {
      ensureAudio();

      if (game.dialog.active) {
        advanceDialogue();
        return;
      }

      if (game.won) {
        restartGame();
        return;
      }

      if (game.mode === 'intro') {
        game.intro.activeSwipeId = id;
        game.intro.lastX = x;
        return;
      }

      const a = input.attackBtn;
      const d = input.dashBtn;
      const j = input.joystick;

      const attackHit = dist(x, y, a.x, a.y) <= a.outerR;
      const dashHit = dist(x, y, d.x, d.y) <= d.outerR;
      const joystickHit = dist(x, y, j.baseX, j.baseY) <= j.touchR;

      if (attackHit && (!a.active || a.id === id)) {
        a.active = true;
        a.id = id;
        a.pressed = true;
        input.attackQueued = true;
        return;
      }

      if (dashHit && (!d.active || d.id === id)) {
        d.active = true;
        d.id = id;
        d.pressed = true;
        input.dashQueued = true;
        return;
      }

      if (joystickHit && (!j.active || j.id === id)) {
        j.active = true;
        j.id = id;
        updateJoystick(x, y);
        return;
      }

      if (!isTouch) {
        input.dragMove.active = true;
        input.dragMove.id = id;
        input.dragMove.sx = x;
        input.dragMove.sy = y;
        updateDragMove(x, y);
      }
    }

    function updateJoystick(x, y) {
      const j = input.joystick;
      let dx = x - j.baseX;
      let dy = y - j.baseY;
      const len = Math.hypot(dx, dy);
      const max = j.knobTravel;

      if (len > max && len > 0) {
        dx = dx / len * max;
        dy = dy / len * max;
      }

      const rawLen = Math.hypot(dx, dy);
      const raw = max > 0 ? clamp(rawLen / max, 0, 1) : 0;
      const dirX = rawLen > 0.0001 ? dx / rawLen : 0;
      const dirY = rawLen > 0.0001 ? dy / rawLen : 0;
      const dead = j.deadZone || 0.14;
      const strength = raw <= dead ? 0 : Math.pow((raw - dead) / (1 - dead), 1.05);

      j.x = max > 0 ? dx / max : 0;
      j.y = max > 0 ? dy / max : 0;
      j.dx = dirX * strength;
      j.dy = dirY * strength;
    }

    function updateDragMove(x, y) {
      const d = input.dragMove;
      const dx = x - d.sx;
      const dy = y - d.sy;
      const max = 84;
      d.dx = clamp(dx / max, -1, 1);
      d.dy = clamp(dy / max, -1, 1);
    }

    function onPointerMove(x, y, id) {
      if (game.mode === 'intro' && game.intro.activeSwipeId === id) {
        const dx = x - game.intro.lastX;
        game.intro.lastX = x;
        if (Math.abs(dx) > 2) {
          game.intro.armed = true;
          game.intro.progress = clamp(game.intro.progress + Math.abs(dx) / Math.max(240, cw * 0.45), 0, 1);
          ensureAudio();
          if (Math.random() < 0.12) beep(180 + game.intro.progress * 120, 0.03, 'triangle', 0.007);
        }
        return;
      }
      if (input.joystick.active && input.joystick.id === id) updateJoystick(x, y);
      if (input.attackBtn.active && input.attackBtn.id === id) {
        input.attackBtn.pressed = dist(x, y, input.attackBtn.x, input.attackBtn.y) <= input.attackBtn.outerR;
      }
      if (input.dashBtn.active && input.dashBtn.id === id) {
        input.dashBtn.pressed = dist(x, y, input.dashBtn.x, input.dashBtn.y) <= input.dashBtn.outerR;
      }
      if (input.dragMove.active && input.dragMove.id === id) updateDragMove(x, y);
    }

    function onPointerUp(id) {
      if (game.mode === 'intro' && game.intro.activeSwipeId === id) {
        game.intro.activeSwipeId = null;
      }
      const j = input.joystick;
      const a = input.attackBtn;
      const db = input.dashBtn;
      const d = input.dragMove;
      if (j.id === id) {
        j.active = false; j.id = null; j.x = j.y = j.dx = j.dy = 0;
      }
      if (a.id === id) {
        a.active = false; a.id = null; a.pressed = false;
      }
      if (db.id === id) {
        db.active = false; db.id = null; db.pressed = false;
      }
      if (d.id === id) {
        d.active = false; d.id = null; d.dx = d.dy = 0;
      }
    }

    canvas.addEventListener('touchstart', (e) => {
      for (const t of e.changedTouches) {
        const p = getTouchPos(t);
        onPointerDown(p.x, p.y, p.id, true);
      }
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      for (const t of e.changedTouches) {
        const p = getTouchPos(t);
        onPointerMove(p.x, p.y, p.id);
      }
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      for (const t of e.changedTouches) onPointerUp(t.identifier);
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchcancel', (e) => {
      for (const t of e.changedTouches) onPointerUp(t.identifier);
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      onPointerDown(e.clientX - rect.left, e.clientY - rect.top, 'mouse');
    });
    window.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      onPointerMove(e.clientX - rect.left, e.clientY - rect.top, 'mouse');
    });
    window.addEventListener('mouseup', () => onPointerUp('mouse'));

    window.addEventListener('keydown', (e) => {
      if (game.dialog.active && (e.key === ' ' || e.key === 'Enter' || e.key === 'e')) {
        e.preventDefault();

        return;
      }
      input.keys[e.key] = true;
      if (game.mode === 'intro' && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd')) {

      if ((e.key === ' ' || e.key === 'Enter') && !e.repeat) {
        input.attackQueued = true;

      if ((e.key === 'Shift' || e.key === 'q') && !e.repeat) {

    window.addEventListener('keyup', (e) => input.keys[e.key] = false);

    function resetTouchControls() {
      input.joystick.active = false;
      input.joystick.id = null;

      input.attackBtn.active = false;

      ctx.fillStyle = '#0a1015';

      shaft.addColorStop(1, '#06090d');

      const wallX = 0;
      const wallW = 120;
      ctx.fillStyle = '#3f4951';

      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(wallW, 0, 36, room.h);

      for (let i = 0; i < 20; i++) {
        const rx = 150 + (i * 37 % (room.w - 200));
        const ry = room.h - ((i * 66 + meta.elapsed * meta.scrollSpeed * (1.2 + (i % 3) * 0.08)) % (room.h + 120)) - 28;
        ctx.strokeStyle = 'rgba(215,235,255,0.16)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(rx + 5, ry - 24 - (i % 2) * 5);
        ctx.stroke();
      }

      for (let i = 0; i < 7; i++) {
        const y = room.h - ((i * 138 + meta.elapsed * meta.scrollSpeed * 0.82) % (room.h + 160)) - 36;
        const x = 170 + ((i * 96) % (room.w - 250));

      ctx.quadraticCurveTo(0, -20 + capeSwing, 24, 8);

    function getLiveInputVector() {
      let dx = 0, dy = 0;
      if (input.keys.ArrowLeft || input.keys.a) dx -= 1;
      if (input.keys.ArrowRight || input.keys.d) dx += 1;
      if (input.keys.ArrowUp || input.keys.w) dy -= 1;
      if (input.keys.ArrowDown || input.keys.s) dy += 1;
      if (Math.abs(input.joystick.dx) > 0.06 || Math.abs(input.joystick.dy) > 0.06) {
        dx = input.joystick.dx;
        dy = input.joystick.dy;
      } else if (Math.abs(input.dragMove.dx) > 0.12 || Math.abs(input.dragMove.dy) > 0.12) {
        dx = input.dragMove.dx;
        dy = input.dragMove.dy;
      }
      return { dx, dy };
    }

    function pullCountLever(room, index) {
      if (!room || room.meta.solved) return;
      const lever = room.levers[index];
      if (!lever || lever.locked) return;
      ensureAudio();
      lever.anim = 1;
      lever.pulse = 1;
      const nextCount = lever.count + 1;
      sfx.lever(index);

      if (nextCount >= 10) {
        lever.count = 0;
        lever.correct = false;
        lever.locked = false;
        lever.overdone = false;
        lever.on = false;
        beep(88, 0.15, 'sawtooth', 0.018, 0, 68);
        beep(62, 0.12, 'square', 0.014, 0.05, 54);
        showHint(`Alavanca ${index + 1} reiniciou após 10 puxões.`, 1600);
        triggerShake(3);
        return;
      }

      lever.count = nextCount;
      lever.on = !lever.on;
      if (lever.count === lever.target) {
        lever.correct = true;
        lever.locked = true;
        lever.on = true;
        chord([220, 275, 330], 0.045, 'triangle', 0.018);
        showHint(`Alavanca ${index + 1} correta.`, 1000);
      } else {
        if (lever.count > lever.target) {
          lever.overdone = true;
          beep(120, 0.06, 'square', 0.014, 0, 95);
          showHint(`Alavanca ${index + 1} passou do ponto.`, 1000);
        }
      }

      if (room.levers.every(l => l.correct)) {
        room.meta.solved = true;
        room.meta.stair.open = true;
        game.globalFlags.countLeverSolved = true;
        game.globalFlags.fallUnlocked = true;
        triggerShake(10);
        sfx.doorOpen();
        chord([196, 247, 294, 392], 0.05, 'triangle', 0.025);
        showHint('Uma escada para baixo se abriu.', 2400);
      }
    }

    function pullTrapLever(room) {
      if (!room || room.meta.triggered || room.meta.broken) return;
      const lever = room.meta.triggerLever;
      if (!lever) return;
      ensureAudio();
      lever.on = true;
      lever.locked = true;
      lever.pulse = 1;
      lever.anim = 1;

      const holeW = Math.max(84, player.w + 34);
      const holeH = Math.max(62, player.h + 26);
      const holeX = clamp(player.x + player.w * 0.5 - holeW * 0.5, 58, room.w - holeW - 58);
      const holeY = clamp(player.y + player.h - 10, 110, room.h - holeH - 62);
      room.meta.floorBreak = { x: holeX, y: holeY, w: holeW, h: holeH, active: true };
      room.meta.triggered = true;
      room.meta.timer = room.meta.breakDelay;
      game.globalFlags.trapTriggered = true;
      sfx.lever(0);
      beep(90, 0.16, 'sawtooth', 0.02, 0, 60);
      noise(0.09, 0.004, 0.02, 420);
      triggerShake(12);
      showHint('O chão cedeu sob seus pés!', 1700);
      for (let i = 0; i < 22; i++) {

      }
    }

    interactNearby = function patchedInteractNearby() {
      const room = game.room;
      if (!room) return;
      if (room.type === 'countLeverPuzzle') {
        const pc = center(player);
        let best = null;
        let bestDist = 999;
        room.levers.forEach((lever) => {
          const lc = center(lever);
          const d = dist(pc.x, pc.y, lc.x, lc.y);
          if (d < 72 && d < bestDist) { best = lever.index; bestDist = d; }
        });
        if (best !== null) {
          pullCountLever(room, best);
          return;
        }
      }
      if (room.type === 'trapLever') {
        const lever = room.meta.triggerLever;
        if (lever && dist(center(player).x, center(player).y, center(lever).x, center(lever).y) < 74) {
          pullTrapLever(room);
          return;
        }
      }
      __origInteractNearby();
    };

    updatePlayer = function patchedUpdatePlayer(dt) {
      if (!game.room || game.room.type !== 'fallChallenge') {
        __origUpdatePlayer(dt);
        return;
      }

      if (player.dead) {
        __origUpdatePlayer(dt);
        return;
      }

      player.hurtTimer = Math.max(0, player.hurtTimer - dt);
      player.attackCd = Math.max(0, player.attackCd - dt);
      player.dashCd = Math.max(0, player.dashCd - dt);
      player.attackTimer = 0;
      player.dashTimer = 0;
      player.dashVX = 0;
      player.dashVY = 0;
      input.attackQueued = false;
      input.dashQueued = false;

      const room = game.room;
      const meta = room.meta;
      const inp = getLiveInputVector();
      let dx = inp.dx;
      if (Math.abs(dx) > 1) dx = Math.sign(dx);

      player.x += dx * 255 * dt;
      player.y = meta.playerScreenY;
      player.x = clamp(player.x, 132, room.w - player.w - 64);
      if (Math.abs(dx) > 0.04) {
        player.dirX = dx;
        player.dirY = 1;
        player.facing = Math.atan2(1, dx);
      }

      meta.elapsed += dt;
      meta.impactTimer = Math.max(0, meta.impactTimer - dt);

      if (Math.random() < 0.42) {
        pushParticle(rand(120, room.w - 36), room.h + 10, rand(-6, 6), -rand(250, 420), rand(0.24, 0.46), '#d7e8ff', rand(1.5, 3), 0);
      }

      if (!meta.platformVisible && meta.elapsed >= meta.platformAppearTime) {
        meta.platformVisible = true;
        meta.platformY = room.h + 64;
        if (!meta.platformHintShown) {
          meta.platformHintShown = true;
          showHint('Uma plataforma apareceu lá embaixo, à esquerda!', 1600);
        }
      }

      if (meta.platformVisible) {
        meta.platformY -= meta.platformRiseSpeed * dt;
      }

      const platform = getFallPlatformRect(room);

    function drawRussell() {

      const pawLift = Math.sin(game.time * 8 + r.tail * 0.7) * 1.2;

      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(r.x + 4, r.y + r.h - 3, r.w - 8, 5);

      // corpo

      ctx.fillStyle = '#c97a2d';
      ctx.fillRect(r.x + 6, r.y + 8, r.w - 12, r.h - 10);
      ctx.fillStyle = '#e7a14b';
      ctx.fillRect(r.x + 8, r.y + 10, r.w - 16, r.h - 13);

      // cabeça
      ctx.fillStyle = '#8a4e18';
      ctx.fillRect(r.x + 4, r.y + 2, r.w - 8, 11);
      ctx.fillStyle = '#cf8133';
      ctx.fillRect(r.x + 6, r.y + 4, r.w - 12, 8);

      // orelhas
      ctx.fillStyle = '#8a4e18';
      ctx.fillRect(r.x + 5, r.y, 5, 5);
      ctx.fillRect(r.x + r.w - 10, r.y, 5, 5);
      ctx.fillStyle = '#f0b06f';
      ctx.fillRect(r.x + 6, r.y + 1, 2, 2);
      ctx.fillRect(r.x + r.w - 8, r.y + 1, 2, 2);

      // rosto
      ctx.fillStyle = '#ffe06a';
      ctx.fillRect(r.x + 9, r.y + 6, 3, 3);
      ctx.fillRect(r.x + r.w - 12, r.y + 6, 3, 3);
      ctx.fillStyle = '#4f2414';
      ctx.fillRect(r.x + 13, r.y + 9, 2, 2);
      ctx.fillRect(r.x + 14, r.y + 10, 1, 1);

      // patinhas
      ctx.fillStyle = '#9f5b1c';
      ctx.fillRect(r.x + 8, r.y + r.h - 3 + pawLift, 4, 3);
      ctx.fillRect(r.x + r.w - 12, r.y + r.h - 3 - pawLift, 4, 3);

      // rabinho
      ctx.fillStyle = '#8a4e18';
      ctx.fillRect(r.x + r.w - 2, r.y + 8 + tail * 0.18, 3, 10);
      ctx.fillRect(r.x + r.w, r.y + 5 + tail * 0.5, 3, 7);

      if (r.attackTimer > 0.02) {
        ctx.strokeStyle = 'rgba(255,244,220,0.95)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(r.x + r.w - 4, r.y + 8);
        ctx.lineTo(r.x + r.w + 9, r.y + 2);
        ctx.moveTo(r.x + r.w - 5, r.y + 12);
        ctx.lineTo(r.x + r.w + 10, r.y + 9);
        ctx.stroke();
      }
      ctx.restore();
    }

    function getHostileList(room) {
      if (!room) return [];
      const list = [];
      for (const e of room.enemies) if (!e.dead) list.push({ kind: 'enemy', ref: e, x: e.x + e.w * 0.5, y: e.y + e.h * 0.5 });
      if (room.boss && !room.boss.dead) list.push({ kind: 'boss', ref: room.boss, x: room.boss.x + room.boss.w * 0.5, y: room.boss.y + room.boss.h * 0.5 });

    function startRussellEntry() {
      const r = game.modifiers.russell;
      if (!r.active || !r.pendingEntry || !game.room) return;
      const entry = (game.room.meta && game.room.meta.secretExit) || { x: player.x - 90, y: 54, w: 80, h: 24 };
      r.pendingEntry = false;
      r.entering = true;
      r.x = entry.x + entry.w * 0.5 - r.w * 0.5;
      r.y = entry.y + 34;
      r.roomId = game.room.id;
      r.tail = rand(0, TAU);

    function updateRussell(dt) {
      if (game.globalFlags.modifierChoice !== 'russell') return;
      const r = game.modifiers.russell;
      if (!r.active || !game.room) return;
      r.roomId = game.room.id;
      r.tail += dt * 8;

      if (r.pendingEntry && game.room.id === 'boss' && !game.dialog.active && !game.fade.active) {
        startRussellEntry();
      }

      if (r.entering) {
        const tx = clamp(player.x - 34, 54, game.room.w - r.w - 54);
        const ty = clamp(player.y + 8, 54, game.room.h - r.h - 54);
        r.x += (tx - r.x) * Math.min(1, dt * 4.2);
        r.y += (ty - r.y) * Math.min(1, dt * 4.2);
        if (dist(r.x, r.y, tx, ty) < 10) {
          r.entering = false;
          showHint('Russell agora segue você.', 1600);
        }
        return;
      }

      if (game.dialog.active || game.fade.active || game.modifiers.choiceUiActive || player.dead) return;

      if (r.attackTimer > 0) {
        r.attackTimer -= dt;
        const target = r.attackTarget;
        if (target && (!target.ref.dead)) {
          const t = 1 - Math.max(0, r.attackTimer) / 0.22;
          const dashX = target.ref.x + target.ref.w * 0.5 - r.w * 0.5 - 10;
          const dashY = target.ref.y + target.ref.h * 0.5 - r.h * 0.5;
          const wave = Math.sin(t * Math.PI) * 12;
          r.x = lerp(r.attackFromX, dashX, t) + wave * 0.15;
          r.y = lerp(r.attackFromY, dashY, t);
          if (!r.attackDone && t > 0.52) {
            r.attackDone = true;
            const dir = normalizedDir(target.ref.x + target.ref.w * 0.5 - r.x, target.ref.y + target.ref.h * 0.5 - r.y);
            if (target.kind === 'boss') damageBoss(1, dir);
            else damageEnemy(target.ref, 1, dir);
            burst(target.ref.x + target.ref.w * 0.5, target.ref.y + target.ref.h * 0.5, 7, ['#ffffff', '#ffe59e', '#c8c8c8'], 72);
          }
        }
        if (r.attackTimer <= 0) {
          r.attackTarget = null;
          r.attackDone = false;
          r.cooldown = 5;
        }
        return;
      }

      const followX = clamp(player.x + (player.dirX >= 0 ? -28 : 28), 54, game.room.w - r.w - 54);
      const followY = clamp(player.y + 9, 54, game.room.h - r.h - 54);
      r.x += (followX - r.x) * Math.min(1, dt * 6);
      r.y += (followY - r.y) * Math.min(1, dt * 6);

      r.cooldown = Math.max(0, r.cooldown - dt);
      const hostiles = getHostileList(game.room);
      if (r.cooldown <= 0 && hostiles.length) {
        let best = null, bestD = Infinity;
        for (const h of hostiles) {
          const d = dist(r.x, r.y, h.x, h.y);
          if (d < bestD) { bestD = d; best = h; }
        }
        if (best) {
          r.attackFromX = r.x;
          r.attackFromY = r.y;
          r.attackTarget = best;
          r.attackTimer = 0.22;
          r.attackDone = false;
          chord([392, 494], 0.025, 'triangle', 0.01);
        }
      }
    }

      const item = {

    function updateFragments(dt) {
      if (game.globalFlags.modifierChoice !== 'fragmentos') return;
      const frag = game.modifiers.fragments;
      for (let i = frag.items.length - 1; i >= 0; i--) {
        const item = frag.items[i];
        item.phase += dt * 6;
        if (item.roomId !== game.room.id) continue;
        const rect = { x: item.x - 6, y: item.y - 8, w: 16, h: 18 };
        if (intersects(player, rect)) {
          frag.items.splice(i, 1);
          frag.count++;
          chord([330, 392], 0.025, 'triangle', 0.012);
          showHint(`Fragmentos: ${frag.count}/3`, 900);
        }
      }
      while (frag.count >= 3 && player.hp < player.maxHp) {
        frag.count -= 3;
        player.hp = Math.min(player.maxHp, player.hp + 1);
        chord([220, 277, 330], 0.035, 'triangle', 0.018);
        burst(player.x + player.w * 0.5, player.y + player.h * 0.5, 10, ['#ff8c96', '#ffd4d8', '#ffffff'], 72);
        showHint('Os fragmentos restauraram 1 coração.', 1600);
      }
    }

    function pressTrialButton(room, index) {
      const meta = room.meta;

      const btn = meta.buttons[index];
      if (!btn) return;
      ensureAudio();
      btn.pulse = 1;
      const expected = meta.buttonSequence[meta.buttonProgress];
      if (index === expected) {
        btn.state = 1;
        meta.buttonProgress++;
        chord([240, 300, 360], 0.03, 'triangle', 0.014);

    function updatePressurePlatePuzzle(room, dt) {
      const plates = room.meta.plates;
      let activeCount = 0;
      for (const plate of plates) {
        let active = false;
        for (const block of room.blocks) {
          const cx = block.x + block.w * 0.5;
          const cy = block.y + block.h * 0.5;
          if (cx > plate.x + 6 && cx < plate.x + plate.w - 6 && cy > plate.y - 4 && cy < plate.y + plate.h + 8) {
            active = true;
            break;
          }
        }
        plate.active = active;
        plate.glow += ((active ? 1 : 0) - plate.glow) * Math.min(1, dt * 7);
        if (active) activeCount++;
      }
      if (!room.meta.solved && activeCount === plates.length) {
        room.meta.solved = true;
        game.globalFlags.pressureSolved2 = true;
        if (room.doors[0]) room.doors[0].locked = false;
        sfx.doorOpen();
        chord([196, 247, 330], 0.05, 'triangle', 0.02);
        triggerShake(6);
        showHint('As placas afundaram. A porta se abriu.', 2200);
      }
    }

    function resetTorchPuzzle(room) {

      }

    function pressTorchPuzzle(room, index) {
      const meta = room.meta;
      if (meta.solved) return;
      const torch = meta.puzzleTorches[index];
      if (!torch) return;
      const expected = meta.sequence[meta.progress];
      torch.pulse = 1;
      ensureAudio();
      if (index === expected) {
        torch.lit = true;
        meta.progress++;
        chord([262, 330, 392], 0.035, 'triangle', 0.014);
        if (meta.progress >= meta.sequence.length) {
          meta.solved = true;
          game.globalFlags.torchSolved2 = true;

      } else {
        for (const t of meta.puzzleTorches) {
          t.wrong = 1;
          t.lit = false;
        }
        meta.progress = 0;
        beep(94, 0.08, 'square', 0.018, 0, 80);

          ctx.moveTo(torch.x, torch.y - 34);
          ctx.lineTo(torch.x - 10, torch.y - 8);
          ctx.lineTo(torch.x, torch.y - 14);
          ctx.lineTo(torch.x + 10, torch.y - 8);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#fff2a8';
          ctx.beginPath();
          ctx.moveTo(torch.x, torch.y - 25);
          ctx.lineTo(torch.x - 5, torch.y - 11);
          ctx.lineTo(torch.x, torch.y - 15);
          ctx.lineTo(torch.x + 5, torch.y - 11);
          ctx.closePath();
          ctx.fill();
        }
      }

    function makeBoss2(x, y) {

    function createBoss2Room() {
      const room = {
        id: 'boss2', type: 'boss2', w: 1100, h: 780,
        walls: [], doors: [], enemies: [], props: [], blocks: [], holes: [], levers: [], projectiles: [], boss: null,
        torches: [{ x: 176, y: 96 }, { x: 924, y: 96 }, { x: 550, y: 96 }],
        objective: 'Algo aguarda na sala final.',
        meta: {
          bossSpawn: { x: 518, y: 154 },
          introStage: 'tremor',
          introTimer: 1.6,
          dialogueQueued: false,
          fightStarted: false,
          endPending: false,
          endTimer: 0,

          summonCd: 7.5,
          phase2: false,
          ceilingDust: 0,
          altarGlow: 0
        }
      };
      buildBorderWalls(room, 54);
      room.props.push(
        rect(84, 248, 176, 24),
        rect(840, 248, 176, 24),
        rect(214, 570, 148, 24),
        rect(738, 570, 148, 24),
        rect(432, 124, 236, 20),

      );
      room.boss = makeBoss2(room.meta.bossSpawn.x, room.meta.bossSpawn.y);
      return room;
    }

    function boss2CastShardRing(room) {
      if (!room || room.id !== 'boss2' || !room.boss || room.boss.dead) return;
      const b = room.boss;
      const cx = b.x + b.w * 0.5;
      const cy = b.y + b.h * 0.44;
      const count = room.meta.phase2 ? 10 : 8;
      for (let i = 0; i < count; i++) {
        const ang = (TAU * i) / count + (room.meta.phase2 ? 0.14 : 0);
        game.projectiles.push({
          x: cx, y: cy,
          vx: Math.cos(ang) * (room.meta.phase2 ? 180 : 155),
          vy: Math.sin(ang) * (room.meta.phase2 ? 180 : 155),
          r: 7, life: 2.6, color: '#f7f7ff', hostile: true, spin: rand(0, TAU), trailHue: 1
        });
      }
      burst(cx, cy, 18, ['#ffffff', '#d8dcff', '#b7bde8'], 118);
      chord([290, 340, 392], 0.05, 'triangle', 0.015);
      showHint('O Asceta Pálido libera estilhaços!', 1200);
    }

    function drawBoss2Extras(room) {
      if (!room || room.id !== 'boss2') return;
      const b = room.boss;
      ctx.save();
      const glow = 0.08 + Math.sin(game.time * 2.6) * 0.025;
      ctx.fillStyle = `rgba(160,160,190,${glow})`;
      ctx.fillRect(442, 86, 216, 40);
      ctx.fillStyle = 'rgba(0,0,0,0.24)';
      ctx.fillRect(420, 98, 260, 74);
      drawStoneBlock(446, 92, 208, 54, 1);
      ctx.fillStyle = 'rgba(236,236,255,0.12)';
      ctx.fillRect(474, 102, 152, 24);
      if (b && !b.dead) {
        const cx = b.x + b.w * 0.5;
        const cy = b.y + b.h * 0.42;
        const sway = Math.sin(game.time * 4.4) * 2;
        ctx.fillStyle = room.meta.phase2 ? 'rgba(255,120,180,0.12)' : 'rgba(210,218,255,0.14)';
        ctx.beginPath();
        ctx.ellipse(cx, cy + 2, 40, 54, 0, 0, TAU);
        ctx.fill();
        // véu claro atrás do corpo
        ctx.fillStyle = 'rgba(245,245,255,0.3)';
        ctx.beginPath();
        ctx.moveTo(cx, b.y + 12);
        ctx.lineTo(b.x + 8, b.y + b.h - 12 + sway);
        ctx.lineTo(b.x + b.w - 8, b.y + b.h - 12 - sway);
        ctx.closePath();
        ctx.fill();
        if (room.meta.phase2) {
          ctx.strokeStyle = 'rgba(255,210,230,0.55)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(cx, cy, 34 + Math.sin(game.time * 8) * 2, 0, TAU);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

      __chapter1PrevInitRooms();
      ensureChapter1State();
      game.rooms.boss2 = createBoss2Room();
      const cont = game.rooms.continue2;

      __chapter1PrevSetRoom(id, spawn, instant);
      ensureChapter1State();
      if (id === 'boss2' && game.room && game.room.meta) {
        const meta = game.room.meta;
        meta.introStage = 'tremor';
        meta.introTimer = 1.6;

        meta.summonCd = 7.5;
        meta.phase2 = false;

        const b = game.room.boss;
        if (b) {
          b.x = meta.bossSpawn.x;
          b.y = meta.bossSpawn.y;
          b.hp = b.maxHp;
          b.dead = false;
          b.state = 'idle';
          b.attackCd = 99;
          b.hurtTimer = 0;
        }
        showHint('A sala final da ala treme ao seu redor...', 1800);
      }
    };

    damageBoss = function chapter1PatchedDamageBoss(amount, dir) {
      if (!game.room || game.room.id !== 'boss2') {
        __chapter1PrevDamageBoss(amount, dir);
        return;
      }
      const room = game.room;
      const boss = room.boss;
      if (!boss || boss.dead || !room.meta.fightStarted) return;
      boss.hp -= amount;
      boss.hurtTimer = 0.24;
      sfx.bossHit();
      const solids = solidsForRoom(room, true).filter(s => s !== boss);
      moveBody(boss, dir.x * 11, 0, solids);
      moveBody(boss, 0, dir.y * 9, solids);
      clampBodyToRoom(boss, room, 8);
      burst(boss.x + boss.w / 2, boss.y + boss.h / 2, 20, ['#d7a0ff', '#fff1ff', '#8f59c7', COLORS.bossGlow], 136);
      triggerShake(5);
      if (boss.hp <= 0) {
        boss.dead = true;
        boss.hp = 0;
        room.enemies.length = 0;
        game.projectiles.length = 0;
        room.meta.endPending = true;
        room.meta.endTimer = 1.15;
        chord([220, 184, 156, 120], 0.08, 'sine', 0.03);
        sfx.victory();
        showHint('O Asceta Pálido foi derrotado.', 2000);
      }
    };

    updateGame = function chapter1PatchedUpdateGame(dt) {
      ensureChapter1State();
      if (chapter1UiActive()) {
        resetTouchControls();
        input.attackQueued = false;
        input.dashQueued = false;
        return;
      }

      __chapter1PrevUpdateGame(dt);
      soundToggleEl.style.display = 'block';

      if (!game.room) return;
      if (game.room.id === 'boss2') {
        const room = game.room;
        const meta = room.meta;
        const boss = room.boss;
        if (boss && !meta.fightStarted && !boss.dead) {
          boss.x = meta.bossSpawn.x;
          boss.y = meta.bossSpawn.y;
          boss.attackCd = 99;
          boss.state = 'idle';
          boss.vx = 0;
          boss.vy = 0;
          game.projectiles = game.projectiles.filter(p => !p.hostile);
          meta.introTimer -= dt;
          meta.ceilingDust += dt;
          if (Math.random() < 0.42) {
            pushParticle(rand(90, room.w - 90), rand(44, 100), rand(-8, 8), rand(18, 58), rand(0.28, 0.56), COLORS.dust, rand(2, 4));
          }
          triggerShake(4.4);
          if (meta.introTimer <= 0 && !meta.dialogueQueued) {
            meta.dialogueQueued = true;
            queueDialogue('Então... era isso que eles estavam protegendo.', 'boss2Entry');
            processDialogueQueue();
          } else if (meta.dialogueQueued && !game.dialog.active && game.dialog.seen.boss2Entry) {
            meta.fightStarted = true;
            boss.attackCd = 1.2;
            sfx.bossAppear();
            showHint('O Asceta Pálido desperta.', 1800);
          }
        }
        if (boss && meta.fightStarted && !boss.dead) {
          if (!meta.phase2 && boss.hp / boss.maxHp <= 0.5) {
            meta.phase2 = true;
            triggerShake(8);
            chord([180, 240, 320], 0.05, 'sawtooth', 0.02);
            showHint('O corpo do asceta se distorce!', 1800);
          }
          boss.shardCd -= dt;
          if (boss.shardCd <= 0) {
            boss.shardCd = meta.phase2 ? 4.2 : 5.8;
            boss2CastShardRing(room);
          }
        }
        if (meta.endPending) {
          meta.endTimer -= dt;
          triggerShake(6.4);
          if (Math.random() < 0.32) pushParticle(rand(80, room.w - 80), rand(36, 120), rand(-5, 5), rand(24, 60), rand(0.24, 0.5), COLORS.dust, rand(2, 4));
          if (meta.endTimer <= 0) {
            meta.endPending = false;
            if (!meta.finalDialogueQueued) {
              meta.finalDialogueQueued = true;
              queueDialogue(['Isso... ainda não era o fundo da dungeon.', 'Se eles protegiam isso...', 'Então o que existe mais abaixo?'], 'chapter1Boss2End');
              processDialogueQueue();
            }
          }
        }
        if (meta.finalDialogueQueued && !game.dialog.active && !game.fade.active && !game.chapter1Flags.chapterEndShown) {
          chapter1ShowFinal();
        }
      }
    };
