<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Masmorra do Porão Selado</title>
  <style>
    :root {
      --ui: rgba(255,255,255,0.12);
      --ui-strong: rgba(255,255,255,0.2);
      --text: #f5f0d8;
      --accent: #d7a34b;
      --danger: #d96459;
      --shadow: rgba(0,0,0,0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
    }

    #hint {
      position: fixed;
      left: 50%;
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      transform: translateX(-50%);
      color: var(--text);
      background: linear-gradient(to bottom, rgba(0,0,0,0.72), rgba(0,0,0,0.36));
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: .3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s ease;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 28px rgba(0,0,0,0.25);
      max-width: calc(100vw - 26px);
      text-align: center;
    }

    #hint.show { opacity: 1; }

    #soundToggle {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      right: calc(env(safe-area-inset-right, 0px) + 14px);
      z-index: 12;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(to bottom, rgba(20,20,24,0.86), rgba(10,10,12,0.78));
      color: var(--text);
      border-radius: 14px;
      padding: 10px 14px;
      font: 700 14px "Trebuchet MS", system-ui, sans-serif;
      box-shadow: 0 8px 20px rgba(0,0,0,0.24);
      min-width: 118px;
      touch-action: manipulation;
    }

    #soundToggle.off {
      color: #cfc8b6;
      opacity: 0.82;
    }

    #dialogueBox {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      transform: translateX(-50%);
      width: min(760px, calc(100vw - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - 28px));
      z-index: 13;
      padding: 14px 16px 12px;
      background: linear-gradient(to bottom, rgba(18,18,22,0.86), rgba(8,8,10,0.92));
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.34);
      color: #f5f0d8;
      display: none;
      pointer-events: auto;
      backdrop-filter: blur(2px);
    }

    #dialogueBox.show { display: block; }

    #dialogueText {
      font-size: clamp(16px, 2.2vw, 22px);
      line-height: 1.45;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
      min-height: 2.8em;
      white-space: pre-line;
    }

    #dialogueContinue {
      margin-top: 10px;
      text-align: right;
      font-size: 12px;
      letter-spacing: .8px;
      color: rgba(245,240,216,0.76);
      text-transform: uppercase;
      animation: pulseContinue 1.08s ease-in-out infinite;
    }

    @keyframes pulseContinue {
      0%, 100% { opacity: .42; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(1px); }
    }

    @media (max-width: 560px) {
      #soundToggle {
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
        min-width: 112px;
        padding: 9px 12px;
        font-size: 13px;
      }

      #dialogueBox {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        width: calc(100vw - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - 20px);
        padding: 13px 14px 11px;
      }
    }


    #rotateWarning {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: linear-gradient(to bottom, rgba(5,5,8,0.96), rgba(10,10,14,0.92));
      backdrop-filter: blur(3px);
    }

    #rotateWarning.show {
      display: flex;
    }

    #rotateWarningCard {
      width: min(92vw, 560px);
      background: linear-gradient(to bottom, rgba(18,18,22,0.98), rgba(8,8,10,0.95));
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      box-shadow: 0 18px 42px rgba(0,0,0,0.42);
      color: #f5f0d8;
      padding: 22px 18px 18px;
      text-align: center;
    }

    #rotateWarningIcon {
      font-size: 42px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.35));
    }

    #rotateWarningTitle {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 700;
      margin-bottom: 10px;
      color: #f5ecd8;
    }

    #rotateWarningText {
      font-size: clamp(15px, 2.2vw, 19px);
      line-height: 1.5;
      opacity: 0.92;
      margin-bottom: 14px;
      white-space: pre-line;
    }

    #rotateWarningTips {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(245,240,216,0.78);
      margin-bottom: 16px;
      white-space: pre-line;
    }

    #rotateFullscreenBtn {
      display: inline-block;
      min-width: 180px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 13px 18px;
      background: linear-gradient(to bottom, rgba(215,163,75,0.34), rgba(90,52,24,0.24));
      color: #f5ecd8;
      font: 700 17px "Trebuchet MS", system-ui, sans-serif;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      touch-action: manipulation;
    }

    #rotateFullscreenBtn[hidden] {
      display: none !important;
    }

    @media (min-width: 900px) and (pointer: fine) {
      #rotateWarning {
        display: none !important;
      }
    }

  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="rotateWarning" aria-live="polite">
    <div id="rotateWarningCard">
      <div id="rotateWarningIcon">↻</div>
      <div id="rotateWarningTitle">Melhor em horizontal</div>
      <div id="rotateWarningText">Vire o celular para jogar melhor.
Depois, use tela cheia para os botões não ficarem grudados.</div>
      <div id="rotateWarningTips">Entre em tela cheia e deixe o celular de lado antes de começar a jogar.</div>
      <button id="rotateFullscreenBtn" type="button">Entrar em tela cheia</button>
    </div>
  </div>
  <div id="hint"></div>
  <button id="soundToggle" type="button">🔊 Som ON</button>
  <div id="dialogueBox" role="dialog" aria-live="polite" aria-label="Diálogo">
    <div id="dialogueText"></div>
    <div id="dialogueContinue">toque para continuar</div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    const hintEl = document.getElementById('hint');
    const soundToggleEl = document.getElementById('soundToggle');
    const dialogueBoxEl = document.getElementById('dialogueBox');
    const dialogueTextEl = document.getElementById('dialogueText');
    const dialogueContinueEl = document.getElementById('dialogueContinue');
    const rotateWarningEl = document.getElementById('rotateWarning');
    const rotateFullscreenBtn = document.getElementById('rotateFullscreenBtn');
    let rotateWarningDismissed = false;

    function isTouchMobile() {
      return window.matchMedia('(pointer: coarse)').matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function isLandscape() {
      return window.matchMedia('(orientation: landscape)').matches || window.innerWidth > window.innerHeight;
    }

    function isFullscreenActive() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
    }

    function canRequestGameFullscreen() {
      const el = document.documentElement;
      return !!(el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen);
    }

    function requestGameFullscreen() {
      const el = document.documentElement;
      try {
        if (el.requestFullscreen) return el.requestFullscreen();
        if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
        if (el.msRequestFullscreen) return el.msRequestFullscreen();
      } catch (err) {
      }
      return Promise.resolve();
    }

    function updateRotateWarning() {
      if (!rotateWarningEl) return;
      if (!isTouchMobile()) {
        rotateWarningEl.classList.remove('show');
        return;
      }
      const landscape = isLandscape();
      const fullscreen = isFullscreenActive();
      const wantsFullscreen = canRequestGameFullscreen();
      const shouldShow = !landscape || (!fullscreen && !rotateWarningDismissed);
      rotateWarningEl.classList.toggle('show', shouldShow);
      const textEl = document.getElementById('rotateWarningText');
      const tipsEl = document.getElementById('rotateWarningTips');
      if (textEl && tipsEl) {
        if (!landscape) {
          textEl.textContent = 'Vire o celular para jogar melhor.\nDepois, use tela cheia para os botões não ficarem grudados.';
          tipsEl.textContent = 'Quando estiver no modo horizontal, toque em "Continuar" para começar.';
        } else if (!fullscreen && !rotateWarningDismissed) {
          textEl.textContent = wantsFullscreen ? 'Agora entre em tela cheia para jogar melhor.' : 'Seu navegador não abriu a tela cheia, mas você já pode continuar.';
          tipsEl.textContent = wantsFullscreen ? 'Se nada acontecer, toque de novo em "Continuar" e o jogo abre mesmo assim.' : 'Os controles ainda vão funcionar normalmente.';
        }
      }
      if (rotateFullscreenBtn) {
        rotateFullscreenBtn.hidden = !landscape || (fullscreen || rotateWarningDismissed);
        rotateFullscreenBtn.textContent = wantsFullscreen ? 'Continuar' : 'Continuar sem tela cheia';
      }
    }

    let cw = 0, ch = 0, DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    function resize() {
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      cw = Math.floor(window.innerWidth);
      ch = Math.floor(window.innerHeight);
      canvas.width = Math.floor(cw * DPR);
      canvas.height = Math.floor(ch * DPR);
      canvas.style.width = cw + 'px';
      canvas.style.height = ch + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', () => { resize(); updateRotateWarning(); });
    resize();
    window.addEventListener('orientationchange', () => setTimeout(updateRotateWarning, 50));
    document.addEventListener('fullscreenchange', updateRotateWarning);
    document.addEventListener('webkitfullscreenchange', updateRotateWarning);
    if (rotateFullscreenBtn) {
      const continueGame = function () {
        rotateWarningDismissed = true;
        Promise.resolve(requestGameFullscreen()).catch(() => {}).finally(() => {
          setTimeout(updateRotateWarning, 180);
        });
      };
      rotateFullscreenBtn.addEventListener('click', continueGame);
      rotateFullscreenBtn.addEventListener('touchend', function (ev) {
        ev.preventDefault();
        continueGame();
      }, { passive: false });
    }
    updateRotateWarning();

    const TAU = Math.PI * 2;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
    const sign = (v) => v < 0 ? -1 : 1;
    const rand = (a, b) => Math.random() * (b - a) + a;
    const irand = (a, b) => Math.floor(rand(a, b + 1));

    function showHint(text, time = 2400) {
      hintEl.textContent = text;
      hintEl.classList.add('show');
      clearTimeout(showHint._t);
      showHint._t = setTimeout(() => hintEl.classList.remove('show'), time);
    }

    let audioCtx = null;
    let soundEnabled = true;
    const soundState = { blockPushCd: 0 };

    function updateSoundToggleLabel() {
      soundToggleEl.textContent = soundEnabled ? '🔊 Som ON' : '🔇 Som OFF';
      soundToggleEl.classList.toggle('off', !soundEnabled);
    }

    function ensureAudio() {
      if (!soundEnabled) return null;
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function beep(freq = 220, duration = 0.08, type = 'square', gain = 0.02, when = 0, slideTo = null) {
      if (!soundEnabled) return;
      const ac = ensureAudio();
      if (!ac) return;
      const t0 = ac.currentTime + when;
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(Math.max(1, freq), t0);
      if (slideTo != null) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + duration);
      }
      g.gain.setValueAtTime(Math.max(0.0001, gain), t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(g);
      g.connect(ac.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.02);
    }

    function noise(duration = 0.05, gain = 0.01, when = 0, highpass = 0) {
      if (!soundEnabled) return;
      const ac = ensureAudio();
      if (!ac) return;
      const frameCount = Math.max(1, Math.floor(ac.sampleRate * duration));
      const buffer = ac.createBuffer(1, frameCount, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < frameCount; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / frameCount);
      }
      const src = ac.createBufferSource();
      src.buffer = buffer;
      let node = src;
      if (highpass > 0) {
        const filter = ac.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = highpass;
        src.connect(filter);
        node = filter;
      }
      const g = ac.createGain();
      const t0 = ac.currentTime + when;
      g.gain.setValueAtTime(Math.max(0.0001, gain), t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      node.connect(g);
      g.connect(ac.destination);
      src.start(t0);
      src.stop(t0 + duration + 0.02);
    }

    function chord(notes, gap = 0.05, type = 'triangle', gain = 0.018) {
      if (!soundEnabled) return;
      notes.forEach((n, i) => beep(n, 0.18, type, gain, i * gap, n * 0.98));
    }

    const sfx = {
      sword() {
        beep(640, 0.04, 'triangle', 0.012, 0, 420);
        beep(230, 0.06, 'square', 0.007, 0.012, 170);
        noise(0.02, 0.0035, 0.004, 1200);
      },
      enemyHit() {
        beep(168, 0.04, 'sawtooth', 0.012, 0, 126);
        noise(0.026, 0.0042, 0, 760);
      },
      enemyDie() {
        beep(220, 0.04, 'square', 0.014, 0, 162);
        beep(164, 0.06, 'triangle', 0.01, 0.028, 104);
        noise(0.05, 0.0058, 0.01, 440);
      },
      lever(index = 0) {
        beep(170 + index * 28, 0.07, 'square', 0.015);
        beep(248 + index * 18, 0.05, 'triangle', 0.01, 0.032, 208);
      },
      blockPush() {
        if (soundState.blockPushCd > 0) return;
        soundState.blockPushCd = 0.08;
        beep(92, 0.06, 'square', 0.009, 0, 78);
        noise(0.035, 0.004, 0.008, 320);
      },
      doorOpen() {
        chord([150, 190, 240], 0.04, 'triangle', 0.016);
        beep(110, 0.13, 'sine', 0.01, 0, 84);
      },
      roomTransition() {
        beep(300, 0.05, 'triangle', 0.011, 0, 240);
        beep(190, 0.07, 'sine', 0.009, 0.03, 142);
        noise(0.03, 0.0026, 0.01, 900);
      },
      hatchOpen() {
        chord([110, 146, 196, 248], 0.045, 'triangle', 0.018);
        beep(88, 0.18, 'sine', 0.012, 0, 60);
        noise(0.05, 0.0032, 0.015, 380);
      },
      bossAppear() {
        beep(86, 0.2, 'sawtooth', 0.018, 0, 62);
        beep(128, 0.18, 'triangle', 0.015, 0.06, 100);
        noise(0.09, 0.0045, 0.03, 200);
      },
      bossHit() {
        beep(120, 0.06, 'square', 0.016, 0, 88);
        beep(210, 0.04, 'triangle', 0.01, 0.02, 160);
        noise(0.03, 0.0045, 0.01, 500);
      },
      victory() {
        chord([262, 330, 392, 523], 0.07, 'sine', 0.022);
        beep(660, 0.26, 'triangle', 0.012, 0.21, 720);
      }
    };

    soundToggleEl.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      soundEnabled = !soundEnabled;
      if (soundEnabled) ensureAudio();
      updateSoundToggleLabel();
      showHint(soundEnabled ? 'Som ativado.' : 'Som desativado.', 1200);
    });
    soundToggleEl.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });
    updateSoundToggleLabel();

    const COLORS = {
      floorA: '#49535c', floorB: '#425059', grout: '#31363b',
      wall: '#69737c', wallDark: '#4b535a', wallLight: '#89939c',
      torch: '#f0c566', torchCore: '#fff4bf',
      hero: '#55c1ff', heroCape: '#1a5c8d', heroSkin: '#f0d0a0', heroTrim: '#d9f5ff', heroShadow: '#0f3550',
      goblin: '#83c15d', goblinDark: '#4a7b32', goblinEar: '#a8e57f', goblinEye: '#f7f3c4',
      bat: '#8571c8', batDark: '#4a3d7f', batEye: '#f4d3ff',
      sword: '#ecf2ff', swordEdge: '#9ac6ff',
      blood: '#c94747', dust: '#d7bf97',
      door: '#8d6435', doorDark: '#5d4123',
      hole: '#151719', stone: '#8a949b', stoneDark: '#60676d',
      leverOn: '#69d17c', leverOff: '#d2c1a3',
      boss: '#b46adf', bossDark: '#5b356f', bossGlow: '#deb7ff', bossEye: '#fff0a8',
      uiBg: 'rgba(0,0,0,0.3)',
      uiLine: 'rgba(255,255,255,0.2)',
      uiTxt: '#f1ebd7',
      uiHp: '#dc5d62',
      uiBoss: '#a55be8'
    };

    const game = {
      mode: 'intro',
      room: null,
      rooms: {},
      camera: { x: 0, y: 0 },
      fade: { active: false, dir: 0, alpha: 0, next: null, spawn: null, onMid: null, midSoundPlayed: false },
      shake: 0,
      particles: [],
      slashes: [],
      projectiles: [],
      globalFlags: { pushSolved: false, leverSolved: false, hatchOpened: false },
      msg: '',
      intro: { progress: 0, activeSwipeId: null, lastX: 0, armed: false },
      dialog: null,
      time: 0,
      won: false,
      deathFade: 0
    };

    const player = {
      x: 180, y: 310, w: 28, h: 32,
      vx: 0, vy: 0, speed: 188,
      dirX: 1, dirY: 0,
      facing: 0,
      hp: 6, maxHp: 6,
      hurtTimer: 0,
      attackCd: 0,
      attackTimer: 0,
      dashCd: 0,
      dashTimer: 0,
      dashVX: 0,
      dashVY: 0,
      stamina: 0,
      dead: false,
      spawnRoom: 'room1',
      spawnX: 180, spawnY: 310
    };

    const input = {
      keys: {},
      joystick: {
        active: false, id: null,
        baseX: 110, baseY: 0,
        x: 0, y: 0, dx: 0, dy: 0,
        r: 90, knobR: 40,
        outerR: 104,
        touchR: 104,
        knobTravel: 72,
        deadZone: 0.14
      },
      attackBtn: { x: 0, y: 0, r: 76, outerR: 90, active: false, id: null, pressed: false },
      dashBtn: { x: 0, y: 0, r: 56, outerR: 68, active: false, id: null, pressed: false, cooldownFlash: 0 },
      pointers: new Map(),
      dragMove: { active: false, id: null, sx: 0, sy: 0, dx: 0, dy: 0 },
      attackQueued: false,
      dashQueued: false
    };

    function createDialogState() {
      return {
        active: false,
        queue: [],
        lines: [],
        index: 0,
        typedText: '',
        fullLine: '',
        charIndex: 0,
        charTimer: 0,
        charDelay: 0.022,
        lineComplete: false,
        seen: {
          intro: false,
          room1Entry: false,
          firstEnemies: false,
          pushSolved: false,
          leverSolved: false,
          basementFall: false,
          bossEntry: false,
          bossDefeat: false
        },
        pendingLeverOpenLine: false,
        pendingVictory: false
      };
    }

    game.dialog = createDialogState();

    function prepareDialogueLine(index = 0) {
      game.dialog.index = index;
      game.dialog.fullLine = game.dialog.lines[game.dialog.index] || '';
      game.dialog.typedText = '';
      game.dialog.charIndex = 0;
      game.dialog.charTimer = 0;
      game.dialog.lineComplete = !game.dialog.fullLine;
      updateDialogueUI();
    }

    function updateDialogueUI() {
      if (!game.dialog.active) return;
      dialogueTextEl.textContent = game.dialog.typedText || '';
      dialogueContinueEl.style.opacity = game.dialog.lineComplete ? '1' : '.45';
      dialogueBoxEl.classList.add('show');
    }

    function fillDialogueLineImmediately() {
      if (!game.dialog.active) return;
      game.dialog.typedText = game.dialog.fullLine;
      game.dialog.charIndex = game.dialog.fullLine.length;
      game.dialog.lineComplete = true;
      updateDialogueUI();
    }

    function updateDialogueTyping(dt) {
      if (!game.dialog.active || game.dialog.lineComplete) return;
      game.dialog.charTimer += dt;
      const delay = game.dialog.charDelay;
      while (game.dialog.charTimer >= delay && !game.dialog.lineComplete) {
        game.dialog.charTimer -= delay;
        game.dialog.charIndex++;
        game.dialog.typedText = game.dialog.fullLine.slice(0, game.dialog.charIndex);
        if (game.dialog.charIndex >= game.dialog.fullLine.length) {
          game.dialog.lineComplete = true;
          game.dialog.typedText = game.dialog.fullLine;
        }
      }
      updateDialogueUI();
    }

    function hideDialogue() {
      game.dialog.active = false;
      game.dialog.lines = [];
      game.dialog.index = 0;
      game.dialog.typedText = '';
      game.dialog.fullLine = '';
      game.dialog.charIndex = 0;
      game.dialog.charTimer = 0;
      game.dialog.lineComplete = false;
      dialogueTextEl.textContent = '';
      dialogueContinueEl.style.opacity = '1';

    function openDialogue(lines) {
      resetTouchControls();
      game.dialog.active = true;
      game.dialog.lines = lines.slice();
      prepareDialogueLine(0);
    }

    function processDialogueQueue() {
      if (game.dialog.active || game.fade.active) return;
      const next = game.dialog.queue.shift();
      if (next) {
        openDialogue(next.lines);
        return;
      }
      if (game.dialog.pendingVictory) {
        game.dialog.pendingVictory = false;
        game.won = true;
        sfx.victory();
      }
    }

    function queueDialogue(lines, key = null) {
      if (key && game.dialog.seen[key]) return;
      const payload = { lines: (Array.isArray(lines) ? lines : [lines]).filter(Boolean) };
      if (!payload.lines.length) return;
      if (key) game.dialog.seen[key] = true;
      game.dialog.queue.push(payload);
      processDialogueQueue();
    }

    function advanceDialogue() {
      if (!game.dialog.active) return false;
      if (!game.dialog.lineComplete) {
        fillDialogueLineImmediately();
        return true;
      }
      if (game.dialog.index < game.dialog.lines.length - 1) {
        prepareDialogueLine(game.dialog.index + 1);
      } else {
        hideDialogue();
        processDialogueQueue();
      }
      return true;
    }

    function safeInset(name) {
      const styles = getComputedStyle(document.documentElement);
      return parseFloat(styles.getPropertyValue(name)) || 0;
    }
    function envTop() { return safeInset('--safe-top'); }
    function envRight() { return safeInset('--safe-right'); }
    function envBottom() { return safeInset('--safe-bottom'); }
    function envLeft() { return safeInset('--safe-left'); }

    function updateControlLayout() {
      const landscape = cw > ch;
      const bottom = Math.max(0, envBottom());
      const left = Math.max(0, envLeft());
      const right = Math.max(0, envRight());

      const shortSide = Math.min(cw, ch);
      const edgePad = landscape ? 24 : 18;
      const bottomPad = landscape ? 18 : 16;

      input.joystick.r = clamp(Math.round(shortSide * (landscape ? 0.132 : 0.122)), 76, 92);
      input.joystick.knobR = Math.round(input.joystick.r * 0.42);
      input.joystick.knobTravel = Math.max(16, input.joystick.r - 18);
      input.joystick.outerR = input.joystick.r + 12;
      input.joystick.touchR = input.joystick.outerR;

      input.attackBtn.r = clamp(Math.round(shortSide * (landscape ? 0.113 : 0.108)), 64, 78);
      input.attackBtn.outerR = input.attackBtn.r + 12;

      input.dashBtn.r = clamp(Math.round(input.attackBtn.r * 0.72), 46, 58);
      input.dashBtn.outerR = input.dashBtn.r + 10;

      input.joystick.baseX = left + edgePad + input.joystick.outerR;
      input.joystick.baseY = ch - bottom - bottomPad - input.joystick.outerR;

      input.attackBtn.x = cw - right - edgePad - input.attackBtn.outerR;
      input.attackBtn.y = ch - bottom - bottomPad - input.attackBtn.outerR;

      const dashGap = landscape ? 16 : 14;
      input.dashBtn.x = input.attackBtn.x - Math.round(input.attackBtn.r * (landscape ? 0.24 : 0.16));
      input.dashBtn.y = input.attackBtn.y - input.attackBtn.outerR - input.dashBtn.outerR - dashGap;

      const minDashY = 120 + envTop();
      if (input.dashBtn.y < minDashY) input.dashBtn.y = minDashY;
    }
    updateControlLayout();
    window.addEventListener('resize', updateControlLayout);
    window.addEventListener('orientationchange', () => setTimeout(updateControlLayout, 60));

    function rect(x, y, w, h) { return { x, y, w, h }; }
    function circle(x, y, r) { return { x, y, r }; }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function containsPoint(r, x, y) {
      return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    }

    function center(ent) {
      return { x: ent.x + ent.w / 2, y: ent.y + ent.h / 2 };

    }

    function makeEnemy(type, x, y) {

      };

      game.room = game.rooms[id];

      player.vx = 0; player.vy = 0;

    function centerCamera(instant = false) {
      if (!game.room) return;
      const tx = clamp(player.x + player.w / 2 - cw / 2, 0, Math.max(0, game.room.w - cw));
      const ty = clamp(player.y + player.h / 2 - ch / 2, 0, Math.max(0, game.room.h - ch));
      if (instant) {
        game.camera.x = tx; game.camera.y = ty;
      } else {
        game.camera.x = lerp(game.camera.x, tx, 0.12);
        game.camera.y = lerp(game.camera.y, ty, 0.12);
      }
    }

    function triggerShake(power = 8) {

    function solidsForRoom(room, includeClosedDoors = true) {
      const solids = [...room.walls, ...room.props];
      if (room.hatch && !room.hatch.open) solids.push(room.hatch);
      if (includeClosedDoors) {
        room.doors.forEach(d => {
          if (d.locked) solids.push(rect(d.x, d.y, d.w, d.h));
        });
      }
      room.blocks.forEach(b => { if (!b.settled) solids.push(b); });
      return solids;
    }

    function moveBody(body, mx, my, solids) {
      body.x += mx;
      for (const s of solids) {
        if (s === body) continue;
        if (intersects(body, s)) {
          if (mx > 0) body.x = s.x - body.w;
          if (mx < 0) body.x = s.x + s.w;
        }
      }
      body.y += my;
      for (const s of solids) {
        if (s === body) continue;
        if (intersects(body, s)) {
          if (my > 0) body.y = s.y - body.h;
          if (my < 0) body.y = s.y + s.h;
        }
      }
    }

    function clampBodyToRoom(body, room, inset = 6) {
      if (!room) return;
      body.x = clamp(body.x, inset, room.w - body.w - inset);
      body.y = clamp(body.y, inset, room.h - body.h - inset);
    }

    function pointSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const ab2 = abx * abx + aby * aby || 1;
      const t = clamp((apx * abx + apy * aby) / ab2, 0, 1);
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function attemptPushBlocks(dx, dy, dt) {
      if (!game.room.blocks.length) return;
      for (const block of game.room.blocks) {
        if (block.settled) continue;
        if (!intersects(expandRect(player, 2), block)) continue;
        let pushX = 0, pushY = 0;
        if (Math.abs(dx) > 0.05) pushX = dx * player.speed * dt;
        if (Math.abs(dy) > 0.05) pushY = dy * player.speed * dt;
        if (!pushX && !pushY) continue;
        const others = solidsForRoom(game.room, true).filter(s => s !== block);
        const beforeX = block.x, beforeY = block.y;
        moveBody(block, pushX, 0, others);
        moveBody(block, 0, pushY, others);
        if (beforeX !== block.x || beforeY !== block.y) {
          burst(block.x + block.w / 2, block.y + block.h - 2, 2, [COLORS.dust, '#c8b28f'], 28, Math.PI);
          sfx.blockPush();
        }
      }
    }

    function expandRect(r, pad) {
      return { x: r.x - pad, y: r.y - pad, w: r.w + pad * 2, h: r.h + pad * 2 };
    }

    function startAttack() {
      if (player.attackCd > 0 || player.dead || game.mode !== 'play') return;
      player.attackCd = 0.25;
      player.attackTimer = 0.18;
      ensureAudio();
      sfx.sword();
      const dir = normalizedDir(player.dirX, player.dirY);
      const ox = player.x + player.w / 2;
      const oy = player.y + player.h / 2;
      const ex = ox + dir.x * 58;
      const ey = oy + dir.y * 54;
      const slash = {
        ox, oy, ex, ey,
        x: ex, y: ey, dirX: dir.x, dirY: dir.y,
        timer: 0.18, max: 0.18,
        radius: 19,
        arc: 1.9,
        hit: new Set()
      };
      game.slashes.push(slash);
      for (let i = 0; i < 14; i++) {
        const a = Math.atan2(dir.y, dir.x) + rand(-0.62, 0.62);
        pushParticle(ex, ey, Math.cos(a) * rand(50, 138), Math.sin(a) * rand(50, 138), rand(0.10, 0.2), i % 3 ? COLORS.sword : '#ffffff', rand(2, 3.2), 3);
      }
      interactNearby();
    }

    function getIntentDir() {
      let dx = 0, dy = 0;
      if (input.keys.ArrowLeft || input.keys.a) dx -= 1;
      if (input.keys.ArrowRight || input.keys.d) dx += 1;
      if (input.keys.ArrowUp || input.keys.w) dy -= 1;
      if (input.keys.ArrowDown || input.keys.s) dy += 1;
      if (Math.abs(input.joystick.dx) > 0.04 || Math.abs(input.joystick.dy) > 0.04) {
        dx = input.joystick.dx;
        dy = input.joystick.dy;
      } else if (Math.abs(input.dragMove.dx) > 0.08 || Math.abs(input.dragMove.dy) > 0.08) {
        dx = input.dragMove.dx;
        dy = input.dragMove.dy;
      }
      if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) {
        dx = player.dirX || 1;
        dy = player.dirY || 0;
      }
      return normalizedDir(dx, dy);
    }

    function startDash() {
      if (player.dashCd > 0 || player.dead || game.mode !== 'play') return;
      const dir = getIntentDir();
      player.dashCd = 0.78;
      player.dashTimer = 0.12;
      player.dashVX = dir.x * 520;
      player.dashVY = dir.y * 520;
      player.dirX = dir.x;
      player.dirY = dir.y;
      player.facing = Math.atan2(dir.y, dir.x);
      ensureAudio();
      beep(360, 0.05, 'square', 0.012);
      beep(520, 0.03, 'triangle', 0.009);
      burst(player.x + player.w / 2, player.y + player.h / 2, 10, [COLORS.hero, COLORS.heroTrim, '#ffffff'], 72);
      input.dashBtn.cooldownFlash = 0.18;
    }

    function normalizedDir(x, y) {
      const len = Math.hypot(x, y) || 1;
      return { x: x / len, y: y / len };
    }

    function interactNearby() {
      const room = game.room;
      if (!room) return;
      if (room.type === 'leverPuzzle') {
        const pc = center(player);
        for (const lever of room.levers) {
          const lc = center(lever);
          if (dist(pc.x, pc.y, lc.x, lc.y) < 60) {
            pullLever(room, lever.index);
            return;
          }
        }
      }
    }

    function pullLever(room, index) {
      if (room.meta.solved) return;
      const lever = room.levers[index];
      if (!lever || lever.on) return;
      ensureAudio();
      lever.on = true;
      lever.pulse = 1;
      sfx.lever(index);
      if (room.meta.sequence[room.meta.progress] === index) {
        room.meta.progress++;
        if (room.meta.progress >= room.meta.sequence.length) {
          room.meta.solved = true;
          game.globalFlags.leverSolved = true;
          triggerShake(9);
          chord([220, 280, 360], 0.05, 'triangle', 0.02);
          showHint('As alavancas ecoam. Algo mudou na sala principal.', 2800);
          if (!game.globalFlags.pushSolved) {
            game.dialog.pendingLeverOpenLine = true;
          }
          maybeOpenMainHatch();
        }
      } else {
        room.meta.progress = 0;
        room.meta.flashing = 0.5;
        setTimeout(() => {
          room.levers.forEach(l => l.on = false);
        }, 170);
        beep(110, 0.12, 'sawtooth', 0.018);
        showHint('Sequência errada. As alavancas resetaram.', 1800);
      }
    }

    function maybeOpenMainHatch() {
      if (game.globalFlags.pushSolved && game.globalFlags.leverSolved && !game.globalFlags.hatchOpened) {
        game.globalFlags.hatchOpened = true;
        const main = game.rooms.main;
        main.hatch.open = true;
        main.meta.hatchPulse = 1.2;
        triggerShake(12);
        chord([150, 190, 240, 320], 0.04, 'triangle', 0.03);
        sfx.hatchOpen();
        showHint('O porão central se abriu!', 2400);
        queueDialogue('Alguma coisa se abriu... mas parece que está tudo caindo aos pedaços.', 'leverSolved');
        game.dialog.pendingLeverOpenLine = false;
        for (let i = 0; i < 42; i++) {
          pushParticle(main.hatch.x + rand(0, main.hatch.w), main.hatch.y + rand(0, 6), rand(-40, 40), rand(10, 70), rand(0.45, 0.95), COLORS.dust, rand(2, 5));
        }
      }
    }

    function damageEnemy(enemy, amount, slashDir) {
      if (enemy.dead) return;
      enemy.hp -= amount;
      enemy.hurtTimer = 0.18;
      sfx.enemyHit();
      burst(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.type === 'bat' ? 5 : 9, [COLORS.blood, COLORS.dust], 95);
      if (slashDir) {
        const solids = solidsForRoom(game.room, true).filter(s => s !== enemy);
        moveBody(enemy, slashDir.x * 8, 0, solids);
        moveBody(enemy, 0, slashDir.y * 8, solids);
        clampBodyToRoom(enemy, game.room, 8);
      }
      if (enemy.hp <= 0) {
        enemy.dead = true;
        sfx.enemyDie();
        triggerShake(enemy.type === 'bat' ? 2 : 4);
        for (let i = 0; i < (enemy.type === 'bat' ? 8 : 12); i++) {
          pushParticle(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, rand(-70, 70), rand(-70, 70), rand(0.25, 0.6), enemy.type === 'bat' ? '#9b8ce0' : '#88cd62', rand(2, 4));
        }
      }
    }

    function damageBoss(amount, dir) {
      const boss = game.room.boss;
      if (!boss || boss.dead) return;
      boss.hp -= amount;
      boss.hurtTimer = 0.24;
      sfx.bossHit();
      const solids = solidsForRoom(game.room, true).filter(s => s !== boss);
      moveBody(boss, dir.x * 11, 0, solids);
      moveBody(boss, 0, dir.y * 9, solids);
      clampBodyToRoom(boss, game.room, 8);
      burst(boss.x + boss.w / 2, boss.y + boss.h / 2, 18, ['#d7a0ff', '#fff1ff', '#8f59c7', COLORS.bossGlow], 128);
      for (let i = 0; i < 6; i++) {
        const a = rand(0, TAU);
        pushParticle(
          boss.x + boss.w / 2 + Math.cos(a) * rand(10, 20),
          boss.y + boss.h / 2 + Math.sin(a) * rand(10, 20),
          Math.cos(a) * rand(35, 115),
          Math.sin(a) * rand(35, 115),
          rand(0.18, 0.32),
          i % 2 ? COLORS.bossGlow : '#ffffff',
          rand(2, 4),
          5
        );
      }
      triggerShake(5);
      if (boss.hp <= 0) {
        boss.dead = true;
        boss.hp = 0;
        chord([220, 190, 160, 130], 0.08, 'sine', 0.03);
        showHint('O guardião caiu.', 2000);
        setTimeout(() => {
          queueDialogue(['E-eu... eu sobrevivi?', 'Q-que sensação foi essa...'], 'bossDefeat');
          game.dialog.pendingVictory = true;
          processDialogueQueue();
        }, 900);
      }
    }

    function hurtPlayer(amount, fromX, fromY) {
      if (player.hurtTimer > 0 || player.dead) return;
      player.hp -= amount;
      player.hurtTimer = 0.75;
      ensureAudio();
      beep(140, 0.12, 'sawtooth', 0.03);
      const pc = center(player);
      const d = normalizedDir(pc.x - fromX, pc.y - fromY);
      const solids = solidsForRoom(game.room, true);
      moveBody(player, d.x * 16, 0, solids);
      moveBody(player, 0, d.y * 16, solids);
      clampBodyToRoom(player, game.room, 10);
      triggerShake(6);
      burst(pc.x, pc.y, 12, [COLORS.blood, '#ffd0d0', COLORS.dust], 90);
      if (player.hp <= 0) {
        player.hp = 0;
        player.dead = true;
        showHint('Você caiu... retornando ao último ponto.', 2000);
      }
    }

    function updatePlayer(dt) {
      if (player.dead) {
        game.deathFade = clamp(game.deathFade + dt, 0, 1.1);
        if (game.deathFade >= 1) {
          player.dead = false;
          player.hp = player.maxHp;
          game.deathFade = 0;
          setRoom(player.spawnRoom, { x: player.spawnX, y: player.spawnY }, true);
        }
        return;
      }

      player.hurtTimer = Math.max(0, player.hurtTimer - dt);
      player.attackCd = Math.max(0, player.attackCd - dt);
      player.attackTimer = Math.max(0, player.attackTimer - dt);
      player.dashCd = Math.max(0, player.dashCd - dt);
      player.dashTimer = Math.max(0, player.dashTimer - dt);
      input.dashBtn.cooldownFlash = Math.max(0, input.dashBtn.cooldownFlash - dt);

      let dx = 0, dy = 0;
      if (input.keys.ArrowLeft || input.keys.a) dx -= 1;
      if (input.keys.ArrowRight || input.keys.d) dx += 1;
      if (input.keys.ArrowUp || input.keys.w) dy -= 1;
      if (input.keys.ArrowDown || input.keys.s) dy += 1;

      if (Math.abs(input.joystick.dx) > 0.06 || Math.abs(input.joystick.dy) > 0.06) {
        dx = input.joystick.dx;
        dy = input.joystick.dy;
      } else if (Math.abs(input.dragMove.dx) > 0.12 || Math.abs(input.dragMove.dy) > 0.12) {
        dx = input.dragMove.dx;
        dy = input.dragMove.dy;
      }

      const len = Math.hypot(dx, dy) || 1;
      dx /= len; dy /= len;
      if (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001) {
        player.dirX = dx; player.dirY = dy;
        player.facing = Math.atan2(dy, dx);
      }

      const solids = solidsForRoom(game.room, true);

      if (input.dashQueued) {
        input.dashQueued = false;
        startDash();
      }

      if (player.dashTimer > 0) {
        moveBody(player, player.dashVX * dt, 0, solids);
        moveBody(player, 0, player.dashVY * dt, solids);
        clampBodyToRoom(player, game.room, 10);
        for (let i = 0; i < 2; i++) {
          pushParticle(player.x + player.w / 2, player.y + player.h * 0.68, rand(-28, 28), rand(-16, 24), rand(0.08, 0.18), i % 2 ? COLORS.heroTrim : COLORS.hero, rand(2, 3), 3);
        }
        checkRoomInteractions();
        return;
      }

      attemptPushBlocks(dx, dy, dt);

      const speedMul = player.attackTimer > 0 ? 0.72 : 1;
      const mx = dx * player.speed * speedMul * dt;
      const my = dy * player.speed * speedMul * dt;
      moveBody(player, mx, 0, solids);
      moveBody(player, 0, my, solids);
      clampBodyToRoom(player, game.room, 10);

      if (input.attackQueued) {
        input.attackQueued = false;
        startAttack();
      }

      checkRoomInteractions();
    }

    function checkRoomInteractions() {
      const room = game.room;
      if (!room) return;

      if (room.id === 'room1') {
        const alive = room.enemies.some(e => !e.dead);
        const wasLocked = room.doors[0].locked;
        room.doors[0].locked = alive;
        if (wasLocked && !room.doors[0].locked) {
          sfx.doorOpen();
          showHint('A porta se abriu.', 1700);
        }
      }

      if (room.id === 'push' && !room.meta.solved) {
        let filledCount = 0;
        room.holes.forEach((h, idx) => {
          h.filled = false;
          for (const b of room.blocks) {
            if (b.settled && b.holeIndex === idx) h.filled = true;
          }
          if (h.filled) filledCount++;
        });
        if (filledCount === room.holes.length) {
          room.meta.solved = true;
          game.globalFlags.pushSolved = true;
          triggerShake(8);
          chord([200, 250, 330], 0.05, 'triangle', 0.018);
          showHint('As pedras afundaram. Algo foi ativado.', 2400);
          queueDialogue('Que barulho foi esse? A dungeon inteira tremeu...', 'pushSolved');
          maybeOpenMainHatch();
        }
      }

      if (room.id === 'main' && game.globalFlags.hatchOpened && room.hatch.open) {
        const pc = center(player);
        if (containsPoint(room.hatch, pc.x, pc.y)) {
          transitionTo('boss', { x: 472, y: 560 });
          queueDialogue('Tenho que tomar mais cuidado com esses lugares...', 'basementFall');
        }
      }

      for (const d of room.doors) {
        if (intersects(player, d)) {
          if (!d.locked) {
            transitionTo(d.target, d.spawn);
            return;
          } else {
            showHint(d.label || 'A porta está selada.', 1100);
          }
        }
      }
    }

    function updateEnemies(dt) {
      const room = game.room;
      if (!room) return;
      const solids = solidsForRoom(room, true);
      const pc = center(player);

      for (const e of room.enemies) {
        if (e.dead) continue;
        e.hurtTimer = Math.max(0, e.hurtTimer - dt);
        e.attackCd = Math.max(0, e.attackCd - dt);
        e.wanderT -= dt;
        e.bob += dt * 8;
        const ec = center(e);
        const d = dist(pc.x, pc.y, ec.x, ec.y);
        let tx = 0, ty = 0;

        if (d < 240) {
          tx = (pc.x - ec.x) / (d || 1);
          ty = (pc.y - ec.y) / (d || 1);
        } else {
          if (e.wanderT <= 0) {
            e.wanderT = rand(0.5, 1.6);
            e.wanderA = rand(0, TAU);
          }
          tx = Math.cos(e.wanderA);
          ty = Math.sin(e.wanderA);
        }

        const speed = e.type === 'bat' ? e.speed * (1 + Math.sin(e.bob) * 0.08) : e.speed;
        moveBody(e, tx * speed * dt, 0, solids);
        moveBody(e, 0, ty * speed * dt, solids);

        if (intersects(player, e) && e.attackCd <= 0) {
          e.attackCd = e.type === 'bat' ? 1.1 : 1.3;
          hurtPlayer(e.dmg, ec.x, ec.y);
        }
      }

      room.enemies = room.enemies.filter(e => !e.dead || e.hurtTimer > 0.01);
    }

    function updateBlocks(dt) {
      const room = game.room;
      if (!room || !room.blocks.length) return;
      for (const block of room.blocks) {
        if (block.settled) continue;
        for (let i = 0; i < room.holes.length; i++) {
          const hole = room.holes[i];
          if (hole.filled) continue;
          const cx = block.x + block.w / 2;
          const cy = block.y + block.h / 2;
          const hx = hole.x + hole.w / 2;
          const hy = hole.y + hole.h / 2;
          if (dist(cx, cy, hx, hy) < 18) {
            block.x = hole.x - 1;
            block.y = hole.y - 1;
            block.settled = true;
            block.holeIndex = i;
            hole.filled = true;
            burst(hx, hy, 12, [COLORS.dust, '#9fa7ae'], 70);
            beep(170, 0.12, 'square', 0.016);
          }
        }
      }
    }

    function updateBoss(dt) {
      const room = game.room;
      if (!room || !room.boss) return;
      const b = room.boss;
      if (b.dead) {
        b.pulse += dt * 5;
        return;
      }

      b.hurtTimer = Math.max(0, b.hurtTimer - dt);
      b.attackCd -= dt;
      b.pulse += dt * 2.5;

      const pc = center(player);
      const bc = center(b);
      const d = dist(pc.x, pc.y, bc.x, bc.y);
      let dx = (pc.x - bc.x) / (d || 1);
      let dy = (pc.y - bc.y) / (d || 1);

      const solids = [...room.walls, ...room.props];

      if (b.state === 'idle') {
        const speed = 65 + (1 - b.hp / b.maxHp) * 24;
        moveBody(b, dx * speed * dt, 0, solids);
        moveBody(b, 0, dy * speed * dt, solids);

        if (b.attackCd <= 0) {
          const rage = b.hp / b.maxHp < 0.5;
          if (Math.random() < (rage ? 0.5 : 0.35)) {
            b.state = 'dash';
            b.dashT = rage ? 0.9 : 0.7;
            b.vx = dx * (rage ? 310 : 260);
            b.vy = dy * (rage ? 310 : 260);
            beep(120, 0.18, 'sawtooth', 0.025);
          } else {
            b.state = 'shot';
            b.shotBurst = rage ? 5 : 3;
            b.shotStep = 0.12;
            beep(230, 0.08, 'triangle', 0.018);
          }
          b.attackCd = rage ? 1.6 : 2.1;
        }
      } else if (b.state === 'dash') {
        b.dashT -= dt;
        moveBody(b, b.vx * dt, 0, solids);
        moveBody(b, 0, b.vy * dt, solids);
        for (let i = 0; i < 3; i++) {
          pushParticle(b.x + b.w / 2, b.y + b.h / 2, rand(-30, 30), rand(-30, 30), rand(0.12, 0.24), i % 2 ? COLORS.bossGlow : '#c8a7ef', rand(3, 5), 5);
        }
        if (intersects(player, b)) hurtPlayer(1, bc.x, bc.y);
        if (b.dashT <= 0) {
          b.state = 'idle';
          triggerShake(4);
        }
      } else if (b.state === 'shot') {
        b.shotStep -= dt;
        moveBody(b, dx * 26 * dt, 0, solids);
        moveBody(b, 0, dy * 26 * dt, solids);
        for (let i = 0; i < 1; i++) {
          pushParticle(bc.x, bc.y - 6, rand(-20, 20), rand(-20, 20), rand(0.08, 0.18), '#e6d2ff', rand(2, 3), 4);
        }
        if (b.shotStep <= 0 && b.shotBurst > 0) {
          b.shotBurst--;
          b.shotStep = 0.16;
          const ang = Math.atan2(dy, dx) + rand(-0.16, 0.16);
          game.projectiles.push({
            x: bc.x, y: bc.y,
            vx: Math.cos(ang) * 230,
            vy: Math.sin(ang) * 230,
            r: 8, life: 3.0, color: '#c381ff', hostile: true, spin: rand(0, TAU), trailHue: rand(0.9, 1.1)
          });
          for (let i = 0; i < 8; i++) {
            pushParticle(bc.x, bc.y, Math.cos(ang + rand(-0.4, 0.4)) * rand(20, 80), Math.sin(ang + rand(-0.4, 0.4)) * rand(20, 80), rand(0.15, 0.35), i % 2 ? '#dfc0ff' : COLORS.bossGlow, rand(2, 4));
          }
          beep(300, 0.05, 'triangle', 0.01);
        }
        if (b.shotBurst <= 0) b.state = 'idle';
      }
    }

    function updateSlashes(dt) {
      for (let i = game.slashes.length - 1; i >= 0; i--) {
        const s = game.slashes[i];
        s.timer -= dt;

        for (const e of game.room.enemies) {
          if (e.dead || s.hit.has(e)) continue;
          const ec = center(e);
          const sweepDist = pointSegmentDistance(ec.x, ec.y, s.ox, s.oy, s.ex, s.ey);
          const ang1 = Math.atan2(s.dirY, s.dirX);
          const ang2 = Math.atan2(ec.y - s.oy, ec.x - s.ox);
          const diff = Math.atan2(Math.sin(ang2 - ang1), Math.cos(ang2 - ang1));
          const bodyRadius = Math.max(e.w, e.h) * 0.34;
          if (sweepDist <= s.radius + bodyRadius && Math.abs(diff) <= s.arc / 2) {
            damageEnemy(e, 1, { x: s.dirX, y: s.dirY });
            s.hit.add(e);
          }
        }

        if (game.room.boss && !game.room.boss.dead && !s.hit.has(game.room.boss)) {
          const bc = center(game.room.boss);
          const sweepDist = pointSegmentDistance(bc.x, bc.y, s.ox, s.oy, s.ex, s.ey);
          const ang1 = Math.atan2(s.dirY, s.dirX);
          const ang2 = Math.atan2(bc.y - s.oy, bc.x - s.ox);
          const diff = Math.atan2(Math.sin(ang2 - ang1), Math.cos(ang2 - ang1));
          const bodyRadius = Math.max(game.room.boss.w, game.room.boss.h) * 0.36;
          if (sweepDist <= s.radius + bodyRadius && Math.abs(diff) <= s.arc / 2) {
            damageBoss(1, { x: s.dirX, y: s.dirY });
            s.hit.add(game.room.boss);
          }
        }

        if (s.timer <= 0) game.slashes.splice(i, 1);
      }
    }

    function updateProjectiles(dt) {
      const room = game.room;
      const solids = [...room.walls, ...room.props];
      for (let i = game.projectiles.length - 1; i >= 0; i--) {
        const p = game.projectiles[i];
        p.life -= dt;
        p.spin = (p.spin || 0) + dt * 11;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        for (let j = 0; j < 2; j++) {
          pushParticle(p.x, p.y, rand(-18, 18), rand(-18, 18), rand(0.1, 0.18), j ? '#f4deff' : p.color, rand(2, 3), 4);
        }
        const pr = { x: p.x - p.r, y: p.y - p.r, w: p.r * 2, h: p.r * 2 };
        let dead = p.life <= 0;
        for (const s of solids) {
          if (intersects(pr, s)) { dead = true; break; }
        }
        if (!dead && intersects(pr, player) && p.hostile) {
          hurtPlayer(1, p.x, p.y);
          dead = true;
        }
        if (dead) {
          burst(p.x, p.y, 12, [p.color, '#f0e0ff', COLORS.dust, COLORS.bossGlow], 90);
          game.projectiles.splice(i, 1);
        }
      }
    }

    function updateParticles(dt) {
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.vy += 18 * dt;
        if (p.life <= 0) game.particles.splice(i, 1);
      }
    }

    function updateFade(dt) {
      if (!game.fade.active) return;
      game.fade.alpha += game.fade.dir * dt * 1.7;
      if (game.fade.dir > 0 && game.fade.alpha >= 0.54 && !game.fade.midSoundPlayed) {
        game.fade.midSoundPlayed = true;
        sfx.roomTransition();
      }
      if (game.fade.dir > 0 && game.fade.alpha >= 1) {
        game.fade.alpha = 1;
        setRoom(game.fade.next, game.fade.spawn, true);
        game.fade.dir = -1;
      } else if (game.fade.dir < 0 && game.fade.alpha <= 0) {
        game.fade.alpha = 0;
        game.fade.active = false;
        processDialogueQueue();
      }
    }

    function updateIntro(dt) {
      const room1 = game.rooms.room1;
      room1.darkness = 1 - game.intro.progress;
      if (game.intro.armed) {
        game.intro.progress = clamp(game.intro.progress + dt * 1.2, 0, 1);
        if (game.intro.progress >= 1) {
          game.mode = 'play';
          room1.lit = true;
          showHint(room1.objective, 2400);
          queueDialogue('Esse lugar fede muito...', 'intro');
          queueDialogue('É... isso vai demorar...', 'room1Entry');
        }
      }
    }

    function updateDialogueTriggers() {
      if (game.mode !== 'play' || !game.room || game.dialog.active || game.fade.active) return;

      if (game.room.id === 'room1' && !game.dialog.seen.firstEnemies) {
        const view = { x: game.camera.x - 36, y: game.camera.y - 36, w: cw + 72, h: ch + 72 };
        const seenEnemy = game.room.enemies.some(e => !e.dead && intersects({ x: e.x, y: e.y, w: e.w, h: e.h }, view));
        if (seenEnemy) {
          queueDialogue('Espera... como ainda existem monstros aqui?', 'firstEnemies');
        }
      }
    }

    function updateGame(dt) {
      game.time += dt;
      soundState.blockPushCd = Math.max(0, soundState.blockPushCd - dt);
      if (game.shake > 0) game.shake = Math.max(0, game.shake - dt * 15);

      if (game.dialog.active) {
        updateDialogueTyping(dt);
      } else {
        if (game.mode === 'intro') {
          updateIntro(dt);
        } else if (game.mode === 'play' && !game.won) {
          updatePlayer(dt);
          updateBlocks(dt);
          updateEnemies(dt);
          updateBoss(dt);
          updateSlashes(dt);
          updateProjectiles(dt);
          centerCamera(false);
        }
      }
      updateDialogueTriggers();
      updateParticles(dt);
      updateFade(dt);
      if (game.room && game.room.id === 'main' && game.room.meta.hatchPulse > 0) {
        game.room.meta.hatchPulse = Math.max(0, game.room.meta.hatchPulse - dt);
      }
    }

    function drawFloor(room) {
      const tile = 32;
      for (let y = 0; y < room.h; y += tile) {
        for (let x = 0; x < room.w; x += tile) {
          ctx.fillStyle = ((x / tile + y / tile) & 1) ? COLORS.floorA : COLORS.floorB;
          ctx.fillRect(x, y, tile, tile);
          ctx.fillStyle = COLORS.grout;
          ctx.fillRect(x, y, tile, 1);
          ctx.fillRect(x, y, 1, tile);
        }
      }
    }

    function drawRoom(room) {
      drawFloor(room);
      drawTorches(room);

      if (room.holes.length) {
        room.holes.forEach(h => {
          ctx.fillStyle = COLORS.hole;
          ctx.fillRect(h.x, h.y, h.w, h.h);
          ctx.fillStyle = 'rgba(255,255,255,0.05)';
          ctx.fillRect(h.x + 6, h.y + 6, h.w - 12, 4);
        });
      }

      room.props.forEach(p => drawStoneBlock(p.x, p.y, p.w, p.h, 1));
      room.walls.forEach(w => drawWall(w));

      room.blocks.forEach(b => drawStoneBlock(b.x, b.y, b.w, b.h, b.settled ? 0.65 : 1));
      room.levers.forEach(drawLever);
      room.doors.forEach(drawDoor);
      if (room.hatch) drawHatch(room.hatch, room.meta.hatchPulse || 0);

      const entities = [...room.enemies];
      if (room.boss) entities.push(room.boss);
      entities.sort((a, b) => (a.y + a.h) - (b.y + b.h));

      for (const e of entities) {
        if (room.boss && e === room.boss) drawBoss(e);
        else if (e.type === 'goblin') drawGoblin(e);
        else if (e.type === 'bat') drawBat(e);
      }

      drawPlayer();
      drawSlashes();
      drawProjectiles();
      drawParticles();

      if (game.mode === 'intro') drawIntroDarkness(room.darkness);
    }

    function drawWall(w) {
      ctx.fillStyle = COLORS.wallDark;
      ctx.fillRect(w.x, w.y, w.w, w.h);
      ctx.fillStyle = COLORS.wall;
      ctx.fillRect(w.x + 3, w.y + 3, w.w - 6, w.h - 6);
      ctx.fillStyle = COLORS.wallLight;
      if (w.h > w.w) ctx.fillRect(w.x + 3, w.y + 3, 6, w.h - 6);
      else ctx.fillRect(w.x + 3, w.y + 3, w.w - 6, 6);
    }

    function drawStoneBlock(x, y, w, h, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = COLORS.stoneDark;
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = COLORS.stone;
      ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(x + 5, y + 5, w - 10, 4);
      ctx.restore();
    }

    function drawTorches(room) {
      room.torches.forEach(t => {
        ctx.fillStyle = '#2d2217';
        ctx.fillRect(t.x - 5, t.y - 12, 10, 22);
        const pulse = 1 + Math.sin(game.time * 8 + t.x * 0.04) * 0.08;
        const r = 16 * pulse;
        const grd = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r * 3.2);
        grd.addColorStop(0, 'rgba(255, 238, 170, 0.24)');
        grd.addColorStop(0.24, 'rgba(255, 200, 90, 0.15)');
        grd.addColorStop(1, 'rgba(255, 130, 20, 0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(t.x, t.y, r * 3.2, 0, TAU); ctx.fill();
        ctx.fillStyle = COLORS.torch;
        ctx.beginPath(); ctx.arc(t.x, t.y, r * 0.65, 0, TAU); ctx.fill();
        ctx.fillStyle = COLORS.torchCore;
        ctx.beginPath(); ctx.arc(t.x, t.y - 2, r * 0.36, 0, TAU); ctx.fill();
      });
    }

    function drawDoor(d) {
      const openFactor = d.locked ? 0.9 : 1;
      ctx.fillStyle = d.locked ? '#7d3535' : COLORS.doorDark;
      ctx.fillRect(d.x, d.y, d.w, d.h);
      ctx.fillStyle = d.locked ? '#b85b5b' : COLORS.door;
      ctx.fillRect(d.x + 4, d.y + 4, d.w - 8, d.h - 8);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      if (d.h > d.w) ctx.fillRect(d.x + 7, d.y + 7, 4, d.h - 14);
      else ctx.fillRect(d.x + 7, d.y + 7, d.w - 14, 4);
      if (!d.locked) {
        ctx.fillStyle = 'rgba(236, 218, 144, 0.15)';
        ctx.fillRect(d.x - 6, d.y - 6, d.w + 12, d.h + 12 * openFactor);
      }
    }

    function drawHatch(h, pulse = 0) {
      ctx.fillStyle = '#251d1a';
      ctx.fillRect(h.x - 6, h.y - 6, h.w + 12, h.h + 12);
      if (h.open) {
        const grd = ctx.createRadialGradient(h.x + h.w / 2, h.y + h.h / 2, 10, h.x + h.w / 2, h.y + h.h / 2, h.w * 0.7 + pulse * 30);
        grd.addColorStop(0, 'rgba(0,0,0,0.95)');
        grd.addColorStop(1, 'rgba(27,18,34,0.3)');
        ctx.fillStyle = grd;
        ctx.fillRect(h.x, h.y, h.w, h.h);
        ctx.strokeStyle = 'rgba(215,163,75,0.25)';
        ctx.lineWidth = 3;
        ctx.strokeRect(h.x, h.y, h.w, h.h);
      } else {
        drawStoneBlock(h.x, h.y, h.w, h.h, 1);
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(h.x + 12, h.y + 12, h.w - 24, h.h - 24);
      }
    }

    function getPlayerSpriteDirection() {
      const ax = Math.abs(player.dirX || 0);
      const ay = Math.abs(player.dirY || 0);
      if (ay > ax * 0.9) return (player.dirY || 0) < 0 ? 'up' : 'down';
      return (player.dirX || 0) < 0 ? 'left' : 'right';
    }

    function drawRotRect(cx, cy, rw, rh, angle, fill, stroke = null, alpha = 1) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.globalAlpha *= alpha;
      ctx.fillStyle = fill;
      ctx.fillRect(-rw / 2, -rh / 2, rw, rh);
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = Math.max(1, Math.round(Math.min(rw, rh) * 0.12));
        ctx.strokeRect(-rw / 2, -rh / 2, rw, rh);
      }
      ctx.restore();
    }

    function drawKnightFront(x, y, w, h, step) {
      const px = (sx, sy, sw, sh, c, a = 1) => {
        ctx.globalAlpha = a;
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x + w * sx), Math.round(y + h * sy), Math.max(1, Math.round(w * sw)), Math.max(1, Math.round(h * sh)));
      };
      const capeSwing = step * 0.02;
      px(0.19, 0.16, 0.62, 0.64, '#101219', 0.94);
      px(0.16 - capeSwing, 0.24, 0.18, 0.52, '#161a24');
      px(0.66 + capeSwing, 0.24, 0.16, 0.52, '#161a24');
      px(0.13, 0.27, 0.22, 0.17, '#4b5262');
      px(0.65, 0.27, 0.22, 0.17, '#4b5262');
      px(0.25, 0.26, 0.5, 0.46, '#242936');
      px(0.28, 0.3, 0.44, 0.06, '#6d7484');
      px(0.31, 0.36, 0.38, 0.24, '#191d28');
      px(0.44, 0.33, 0.13, 0.31, '#ffe17e');
      px(0.35, 0.42, 0.31, 0.09, '#ffe17e');
      px(0.435, 0.29, 0.14, 0.39, 'rgba(255,220,120,0.16)');
      px(0.3, 0.62, 0.4, 0.07, '#77502a');
      px(0.29, 0.03, 0.42, 0.29, '#1f2430');
      px(0.33, 0.015, 0.34, 0.06, '#4b5262');
      px(0.31, 0.08, 0.38, 0.17, '#0d1017');
      px(0.35, 0.13, 0.09, 0.06, '#ffcf45');
      px(0.56, 0.13, 0.09, 0.06, '#ffcf45');
      px(0.29, 0.7, 0.15, 0.22, '#262b39');
      px(0.56, 0.7, 0.15, 0.22, '#262b39');
      px(0.22, 0.44, 0.09, 0.28, '#202531');
      px(0.69, 0.44, 0.09, 0.28, '#202531');
      drawRotRect(x + w * 0.18, y + h * 0.67, w * 0.11, h * 0.13, Math.PI * 0.06, '#b48649');
      drawRotRect(x + w * 0.185, y + h * 0.84, w * 0.095, h * 0.56, Math.PI * 0.1, '#d9dce4');
      drawRotRect(x + w * 0.186, y + h * 0.83, w * 0.028, h * 0.5, Math.PI * 0.1, '#8f97a9');
      px(0.16, 0.99, 0.05, 0.05, '#f0f3fa');
      ctx.globalAlpha = 1;
    }

    function drawKnightBack(x, y, w, h, step) {
      const px = (sx, sy, sw, sh, c, a = 1) => {
        ctx.globalAlpha = a;
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x + w * sx), Math.round(y + h * sy), Math.max(1, Math.round(w * sw)), Math.max(1, Math.round(h * sh)));
      };
      const capeWave = step * 0.03;
      px(0.22, 0.08, 0.56, 0.22, '#2a3040');
      px(0.16, 0.23, 0.68, 0.62, '#0e1118');
      px(0.14 - capeWave, 0.29, 0.24, 0.54, '#171b24');
      px(0.62 + capeWave, 0.29, 0.24, 0.54, '#171b24');
      px(0.28, 0.03, 0.44, 0.25, '#1f2330');
      px(0.34, 0.015, 0.32, 0.06, '#4a5262');
      px(0.25, 0.28, 0.5, 0.15, '#424958');
      px(0.31, 0.73, 0.13, 0.19, '#242936');
      px(0.56, 0.73, 0.13, 0.19, '#242936');
      ctx.globalAlpha = 1;
    }

    function drawKnightSide(x, y, w, h, facingRight, frontBias, step) {
      ctx.save();
      if (!facingRight) {
        ctx.translate(x + w, 0);
        ctx.scale(-1, 1);
        x = 0;
      }
      const px = (sx, sy, sw, sh, c, a = 1) => {
        ctx.globalAlpha = a;
        ctx.fillStyle = c;
        ctx.fillRect(Math.round(x + w * sx), Math.round(y + h * sy), Math.max(1, Math.round(w * sw)), Math.max(1, Math.round(h * sh)));
      };
      const capeWave = step * 0.025 + (1 - frontBias) * 0.02;
      px(0.17 - capeWave, 0.17, 0.3, 0.64, '#11131a', 0.96);
      px(0.1 - capeWave, 0.25, 0.22, 0.52, '#171a24');
      px(0.33, 0.27, 0.36, 0.46, '#252a36');
      px(0.28, 0.29, 0.18, 0.15, '#4a5161');
      px(0.58, 0.3, 0.17, 0.15, '#4a5161');
      px(0.45, 0.34, 0.15, 0.26, '#1a1e29');
      if (frontBias > 0.4) {
        px(0.485, 0.35, 0.1, 0.23, '#ffe17e');
        px(0.445, 0.435, 0.2, 0.065, '#ffe17e');
      }
      px(0.43, 0.62, 0.19, 0.07, '#6e4a24');
      px(0.41, 0.035, 0.25, 0.27, '#202531');
      px(0.46, 0.015, 0.18, 0.06, '#4b5262');
      px(0.52, 0.115, 0.1, 0.055, '#ffcf45');
      px(0.35, 0.45, 0.09, 0.26, '#1e232e');
      px(0.6, 0.43, 0.08, 0.28, '#1e232e');
      px(0.45, 0.7, 0.11, 0.22, '#262b39');
      px(0.6, 0.7, 0.1, 0.22, '#262b39');
      drawRotRect(x + w * 0.73, y + h * 0.67, w * 0.11, h * 0.12, Math.PI * 0.16, '#b48649');
      drawRotRect(x + w * 0.79, y + h * 0.8, w * 0.11, h * 0.53, Math.PI * 0.58, '#d9dce4');
      drawRotRect(x + w * 0.79, y + h * 0.8, w * 0.03, h * 0.48, Math.PI * 0.58, '#8b93a4');
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawPlayer() {
      const flash = player.hurtTimer > 0 && Math.sin(game.time * 35) > 0;
      const x = player.x, y = player.y, w = player.w, h = player.h;
      const visW = w * 1.12, visH = h * 1.12;
      const visX = x - (visW - w) * 0.5;
      const visY = y - (visH - h) + 1;
      const dashGlow = player.dashTimer > 0 ? 0.55 + Math.sin(game.time * 50) * 0.15 : 0;
      const dir = getPlayerSpriteDirection();
      const moving = Math.abs(player.vx) + Math.abs(player.vy) > 6 || input.joystick.active;
      const step = moving ? Math.sin(game.time * 10) : Math.sin(game.time * 3) * 0.25;
      ctx.save();
      if (flash) ctx.globalAlpha = 0.45;
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(x + w * 0.08, y + h - 6, w * 0.84, 7);
      if (dashGlow > 0) {
        ctx.fillStyle = `rgba(255,208,95,${dashGlow * 0.18})`;
        ctx.fillRect(visX - 5, visY - 5, visW + 10, visH + 10);
      }
      if (dir === 'down') {
        drawKnightFront(visX, visY, visW, visH, step);
      } else if (dir === 'up') {
        drawKnightBack(visX, visY, visW, visH, step);
      } else if (dir === 'right') {
        drawKnightSide(visX, visY, visW, visH, true, 1, step);
      } else {
        drawKnightSide(visX, visY, visW, visH, false, 0, step);
      }
      ctx.restore();
    }

    function drawGoblin(e) {
      const flash = e.hurtTimer > 0 && Math.sin(game.time * 30) > 0;
      const scale = 1.1;
      const w = e.w * scale, h = e.h * scale;
      const x = e.x - (w - e.w) * 0.5, y = e.y - (h - e.h) + 1;
      const eyeSize = Math.max(2, Math.round(w * 0.08));
      ctx.save();
      if (flash) ctx.globalAlpha = 0.4;
      ctx.fillStyle = 'rgba(0,0,0,0.24)';
      ctx.fillRect(e.x + e.w * 0.08, e.y + e.h - 5, e.w * 0.84, 6);
      ctx.fillStyle = COLORS.goblinDark;
      ctx.fillRect(x + w * 0.12, y + h * 0.3, w * 0.66, h * 0.48);
      ctx.fillStyle = COLORS.goblin;
      ctx.fillRect(x + w * 0.18, y + h * 0.08, w * 0.5, h * 0.36);
      ctx.fillStyle = COLORS.goblinEar;
      ctx.fillRect(x + w * 0.12, y + h * 0.12, w * 0.08, h * 0.12);
      ctx.fillRect(x + w * 0.66, y + h * 0.12, w * 0.08, h * 0.12);
      ctx.fillStyle = COLORS.goblinEye;
      ctx.fillRect(Math.round(x + w * 0.3), Math.round(y + h * 0.2), eyeSize, eyeSize);
      ctx.fillRect(Math.round(x + w * 0.48), Math.round(y + h * 0.2), eyeSize, eyeSize);
      ctx.fillStyle = '#233013';
      ctx.fillRect(x + w * 0.34, y + h * 0.3, w * 0.18, h * 0.06);
      ctx.fillStyle = '#95d873';
      ctx.fillRect(x + w * 0.24, y + h * 0.12, w * 0.38, h * 0.08);
      ctx.restore();
    }

    function drawBat(e) {
      const flash = e.hurtTimer > 0 && Math.sin(game.time * 30) > 0;
      const bob = Math.sin(e.bob) * 4;
      const flap = Math.sin(game.time * 22 + e.x * 0.3) * 1.8;
      const scale = 1.12;
      ctx.save();
      if (flash) ctx.globalAlpha = 0.4;
      ctx.translate(e.x + e.w / 2, e.y + e.h / 2 + bob);
      ctx.scale(scale, scale);
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(-11, 11, 22, 4);
      ctx.fillStyle = COLORS.batDark;
      ctx.fillRect(-12, -3, 24, 10);
      ctx.fillStyle = COLORS.bat;
      ctx.fillRect(-7, -1, 14, 10);
      ctx.fillStyle = COLORS.batDark;
      ctx.fillRect(-18, -4 - flap, 8, 8);
      ctx.fillRect(10, -4 + flap, 8, 8);
      ctx.fillStyle = COLORS.batEye;
      ctx.fillRect(-3, 1, 2, 2);
      ctx.fillRect(1, 1, 2, 2);
      ctx.fillStyle = '#d7c1ff';
      ctx.fillRect(-4, -2, 8, 2);
      ctx.restore();
    }

    function drawBoss(b) {
      const flash = b.hurtTimer > 0 && Math.sin(game.time * 32) > 0;
      const pulse = 1 + Math.sin(b.pulse * 3) * 0.04;
      const hw = b.w / 2;
      const hh = b.h / 2;
      ctx.save();
      ctx.translate(b.x + hw, b.y + hh);
      ctx.scale(pulse * 1.03, pulse * 1.03);
      if (flash) ctx.globalAlpha = 0.42;
      if (b.variant === 'boss2') {
        const haloA = 0.22 + Math.sin(game.time * 6.5) * 0.06;
        ctx.fillStyle = 'rgba(0,0,0,0.32)';
        ctx.fillRect(-hw * 0.7, hh * 0.68, hw * 1.4, 8);
        ctx.fillStyle = `rgba(235,239,255,${haloA})`;
        ctx.beginPath();
        ctx.ellipse(0, 2, hw + 20, hh * 0.72, 0, 0, TAU);
        ctx.fill();
        // corpo magro branco
        ctx.fillStyle = '#eaedf8';
        ctx.beginPath();
        ctx.moveTo(0, -hh * 0.9);
        ctx.lineTo(-hw * 0.52, -hh * 0.12);
        ctx.lineTo(-hw * 0.34, hh * 0.92);
        ctx.lineTo(hw * 0.34, hh * 0.92);
        ctx.lineTo(hw * 0.52, -hh * 0.12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#cfd5e8';
        ctx.fillRect(-hw * 0.26, -hh * 0.84, hw * 0.52, hh * 0.34);
        ctx.fillStyle = '#9ca4ba';
        ctx.fillRect(-hw * 0.34, -hh * 0.74, hw * 0.68, hh * 0.18);
        ctx.fillStyle = '#f7f9ff';
        ctx.fillRect(-hw * 0.18, -hh * 0.54, hw * 0.36, hh * 0.9);
        ctx.fillStyle = '#bcc4d6';
        ctx.fillRect(-hw * 0.1, hh * 0.18, hw * 0.2, hh * 0.56);
        // braços finos
        ctx.fillStyle = '#dce1ef';
        ctx.fillRect(-hw * 0.56, -hh * 0.1, 5, hh * 0.86);
        ctx.fillRect(hw * 0.56 - 5, -hh * 0.1, 5, hh * 0.86);
        // olhos e boca
        ctx.fillStyle = '#5d6272';
        ctx.fillRect(-hw * 0.16, -hh * 0.69, 4, 4);
        ctx.fillRect(hw * 0.06, -hh * 0.69, 4, 4);
        ctx.fillRect(-4, -hh * 0.56, 8, 3);
        if (!b.dead) {
          ctx.strokeStyle = `rgba(245,248,255,${0.34 + Math.sin(game.time * 7) * 0.12})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(0, 6, hw + 14, hh * 0.78 + Math.sin(game.time * 6) * 1.5, 0, 0, TAU);
          ctx.stroke();
        }
        ctx.restore();
        return;
      }
      ctx.fillStyle = 'rgba(0,0,0,0.38)';
      ctx.fillRect(-hw * 0.82, hh * 0.6, hw * 1.64, 10);
      ctx.fillStyle = 'rgba(222,183,255,0.16)';
      ctx.beginPath();
      ctx.arc(0, 2, Math.max(34, hw + 8), 0, TAU);
      ctx.fill();
      ctx.fillStyle = COLORS.bossDark;
      ctx.fillRect(-hw * 0.9, -hh * 0.08, hw * 1.8, hh * 1.2);
      ctx.fillStyle = COLORS.boss;
      ctx.fillRect(-hw * 0.64, -hh * 0.66, hw * 1.28, hh * 0.82);
      ctx.fillStyle = COLORS.bossGlow;
      ctx.fillRect(-hw * 0.34, -hh * 0.2, hw * 0.68, hh * 0.18);
      ctx.fillStyle = COLORS.bossEye;
      ctx.fillRect(-hw * 0.36, -hh * 0.42, 5, 5);
      ctx.fillRect(hw * 0.14, -hh * 0.42, 5, 5);
      ctx.fillStyle = '#25102c';
      ctx.fillRect(-7, 0, 14, 4);
      ctx.fillRect(-hw * 0.86, -hh * 0.48, 7, 18);
      ctx.fillRect(hw * 0.74, -hh * 0.48, 7, 18);
      ctx.fillStyle = '#efe2ff';
      ctx.fillRect(-hw * 0.72, -hh * 0.55, 3, 12);
      ctx.fillRect(hw * 0.6, -hh * 0.55, 3, 12);
      if (!b.dead) {
        ctx.strokeStyle = `rgba(223,192,255,${0.38 + Math.sin(game.time * 7) * 0.12})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 8, Math.max(32, hw + 5) + Math.sin(game.time * 6) * 2, 0, TAU);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawLever(l) {
      ctx.fillStyle = '#50473c';
      ctx.fillRect(l.x + 9, l.y + 18, 8, 18);
      ctx.fillStyle = l.on ? COLORS.leverOn : COLORS.leverOff;
      const angle = l.on ? -12 : 10;
      ctx.save();
      ctx.translate(l.x + 13, l.y + 20);
      ctx.rotate(angle * Math.PI / 180);
      ctx.fillRect(-2, -18, 4, 20);
      ctx.fillRect(-5, -22, 10, 8);
      ctx.restore();
      if (l.pulse > 0) {
        l.pulse *= 0.9;
        ctx.strokeStyle = `rgba(255,255,255,${0.3 * l.pulse})`;
        ctx.strokeRect(l.x - 6, l.y - 6, l.w + 12, l.h + 12);
      }
    }

    function drawProjectiles() {
      for (const p of game.projectiles) {
        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.8);
        grd.addColorStop(0, 'rgba(255,255,255,0.95)');
        grd.addColorStop(0.35, p.color);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2.8, 0, TAU); ctx.fill();
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.spin || 0);
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.fillRect(-p.r * 1.8, -1.5, p.r * 3.6, 3);
        ctx.fillRect(-1.5, -p.r * 1.8, 3, p.r * 3.6);
        ctx.restore();
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath(); ctx.arc(p.x - p.r * 0.18, p.y - p.r * 0.18, p.r * 0.28, 0, TAU); ctx.fill();
      }
    }

    function drawParticles() {
      for (const p of game.particles) {
        const a = clamp(p.life / p.maxLife, 0, 1);
        if (p.glow > 0) {
          ctx.fillStyle = p.color.replace(')', `, ${a * 0.15})`).replace('rgb', 'rgba');
        }
        ctx.globalAlpha = a;
        if (p.glow) {
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size + p.glow, 0, TAU); ctx.fill();
        }
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }

    function drawSlashes() {
      for (const s of game.slashes) {
        const t = s.timer / s.max;
        const ang = Math.atan2(s.dirY, s.dirX);
        const px = player.x + player.w / 2;
        const py = player.y + player.h / 2;
        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${0.18 + t * 0.7})`;
        ctx.lineWidth = 13 * t + 3;
        ctx.beginPath();
        ctx.arc(px, py, 24 + (1 - t) * 18, ang - s.arc * 0.72, ang + s.arc * 0.72);
        ctx.stroke();
        ctx.strokeStyle = `rgba(154,198,255,${0.18 + t * 0.55})`;
        ctx.lineWidth = 7 * t + 1.5;
        ctx.beginPath();
        ctx.arc(px, py, 32 + (1 - t) * 20, ang - s.arc * 0.56, ang + s.arc * 0.56);
        ctx.stroke();
        ctx.strokeStyle = `rgba(215,245,255,${0.12 + t * 0.4})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(px + s.dirX * 12, py + s.dirY * 12);
        ctx.lineTo(s.ex, s.ey);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawIntroDarkness(amount) {
      ctx.fillStyle = `rgba(0,0,0,${clamp(amount, 0, 1)})`;
      ctx.fillRect(game.camera.x, game.camera.y, cw, ch);
      if (amount > 0.05) {
        ctx.fillStyle = `rgba(255,245,220,${0.95 * clamp(amount + 0.15, 0, 1)})`;
        ctx.font = '700 26px Trebuchet MS, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Arraste o dedo para o lado', game.camera.x + cw / 2, game.camera.y + ch / 2 + 10);
        ctx.font = '14px Trebuchet MS, sans-serif';
        ctx.globalAlpha = 0.8;
        ctx.fillText('ou use A/D ou ←/→ no computador', game.camera.x + cw / 2, game.camera.y + ch / 2 + 36);
        ctx.globalAlpha = 1;
      }
    }

    function drawLightingOverlay() {
      const room = game.room;
      if (!room) return;
      ctx.save();
      const darkness = room.id === 'room1' && game.mode === 'intro' ? room.darkness : 0.36;
      const grad = ctx.createRadialGradient(
        player.x + player.w / 2, player.y + player.h / 2,
        30,
        player.x + player.w / 2, player.y + player.h / 2,
        220
      );
      grad.addColorStop(0, `rgba(0,0,0,${Math.max(0, darkness - 0.42)})`);
      grad.addColorStop(0.55, `rgba(0,0,0,${Math.max(0.12, darkness)})`);
      grad.addColorStop(1, `rgba(0,0,0,${Math.min(0.82, darkness + 0.3)})`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, room.w, room.h);
      ctx.restore();
    }

    function drawUI() {
      drawHud();
      drawTouchControls();
      drawFade();
      if (player.dead) {
        ctx.fillStyle = `rgba(0,0,0,${clamp(game.deathFade, 0, 0.9)})`;
        ctx.fillRect(0, 0, cw, ch);
      }
      if (game.won) drawVictory();
    }

    function drawHeart(x, y, size, filled) {
      const s = size;
      ctx.fillStyle = filled ? COLORS.uiHp : 'rgba(255,255,255,0.14)';
      ctx.fillRect(x + s * 0.15, y, s * 0.3, s * 0.28);
      ctx.fillRect(x + s * 0.55, y, s * 0.3, s * 0.28);
      ctx.fillRect(x, y + s * 0.2, s, s * 0.28);

      ctx.beginPath(); ctx.arc(j.baseX, j.baseY, j.outerR, 0, TAU); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.10)';

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';

      ctx.beginPath(); ctx.arc(j.baseX, j.baseY, j.r, 0, TAU); ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.09)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(j.baseX - j.r + 18, j.baseY); ctx.lineTo(j.baseX + j.r - 18, j.baseY);
      ctx.moveTo(j.baseX, j.baseY - j.r + 18); ctx.lineTo(j.baseX, j.baseY + j.r - 18);

      ctx.fillStyle = 'rgba(255,255,255,0.36)';

      ctx.beginPath(); ctx.arc(a.x, a.y, a.outerR, 0, TAU); ctx.fill();

      ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, TAU); ctx.fill();
      ctx.strokeStyle = a.pressed ? 'rgba(255,231,173,0.75)' : 'rgba(255,255,255,0.22)';

      ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, TAU); ctx.stroke();

      ctx.fillStyle = '#eef5ff';
      ctx.fillRect(-6, -30, 12, 36);
      ctx.fillStyle = '#c89e58';
      ctx.fillRect(-17, 5, 34, 9);
      ctx.fillStyle = '#8b6736';
      ctx.fillRect(-4.5, 12, 9, 16);
      ctx.restore();

      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.textAlign = 'center';
      ctx.font = 'bold 14px Trebuchet MS, sans-serif';
      ctx.fillText('ATQ', a.x, a.y + a.r * 0.58);

      const d = input.dashBtn;
      const dashReady = player.dashCd <= 0;
      ctx.fillStyle = 'rgba(0,0,0,0.26)';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.outerR, 0, TAU); ctx.fill();
      ctx.fillStyle = d.pressed ? 'rgba(100,200,255,0.38)' : (dashReady ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)');
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, TAU); ctx.fill();
      ctx.strokeStyle = dashReady ? 'rgba(180,230,255,0.42)' : 'rgba(255,255,255,0.14)';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, TAU); ctx.stroke();

        ctx.strokeStyle = 'rgba(125,221,255,0.85)';
        ctx.lineWidth = 4;

        ctx.arc(d.x, d.y, d.r - 4, -Math.PI / 2, -Math.PI / 2 + TAU * (1 - player.dashCd / 0.78));

      ctx.save();
      ctx.translate(d.x, d.y - 1);

      ctx.beginPath();

      ctx.lineTo(2, -8);

      ctx.lineTo(10, 0);
      ctx.lineTo(-2, 12);

      ctx.fillStyle = 'rgba(255,255,255,0.88)';
